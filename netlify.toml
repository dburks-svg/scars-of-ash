# Scars of Ash is a no-build game: index.html, gamedata.js, styles.css, and
# assets are served exactly as they sit in the repo. There is nothing to compile.
[build]
  publish = "."
  command = ""

# Never let a browser hold a stale copy of the game logic. The HTML entry point
# and the two scripts change together on every deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/gamedata.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sprites are content-stable, so let them sit in cache.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
