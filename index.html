          if (selfKO) {
            const hasSurvivor = newTeam.some((c, i) => i !== state.activeCreatureIndex && c.hp > 0);
            if (!hasSurvivor) {
              return handleCreatureFaint(state, newTeam, newEnemy, log, selfKOCause);
            }
            const difficulty = getDifficulty(state);
            const fallen = { ...newTeam[state.activeCreatureIndex] };
            const scar = getScarForDeathCause(fallen, selfKOCause, difficulty);
            fallen.hp = 0;
            fallen.scars = [...(fallen.scars || []), scar];
            newTeam[state.activeCreatureIndex] = fallen;
            log.push(`${fallen.nickname || fallen.name} fell with the enemy.`);
            log.push(`  → ${scar.name}: ${scar.description}`);
            if (scar.upsideDescription) {
              log.push(`  → But the flame remembers: ${scar.upsideDescription}`);
            }
            survivorIndex = newTeam.findIndex(c => c.hp > 0);
          }

          if (state.isBossFight && state.bossPhase === 1 &&
              newEnemy.hp <= state.enemyCreature.maxHp * GAME_CONFIG.bosses.phaseTransitionThreshold && newEnemy.hp > 0) {
            const difficulty = getDifficulty(state);
            // Broken difficulty: no phase transition pause (boss still transforms but no HP recovery)
            if (difficulty.bossPhaseTransition) {
              newEnemy.hp += state.isHollowWardenFight ? GAME_CONFIG.bosses.hollowWardenPhaseHeal : GAME_CONFIG.bosses.obsidianHoundPhaseHeal;
            }

            if (state.isHollowWardenFight) {
              HOLLOW_WARDEN_DIALOGUE.phase2.forEach(line => log.push(line));
              log.push('The Hollow Warden fractures! Light and dark merge into chaos!');
              return {
                ...state,
                team: newTeam,
                enemy: newEnemy,
                enemyCreature: { ...state.enemyCreature, type: 'darklight' },
                battleLog: log,
                bossPhase: 2,
                arenaEffect: 'fracturedAura',
                turnPhase
              };
            } else {
              BOSS_DIALOGUE.phase2.forEach(line => log.push(line));
              log.push('Obsidian Hound transforms! The arena ignites with scorched earth!');
              return {
                ...state,
                team: newTeam,
                enemy: newEnemy,
                battleLog: log,
                bossPhase: 2,
                arenaEffect: 'scorchedEarth',
                turnPhase
              };
            }
          }

          if (newEnemy.hp <= 0) {
            // Fractured scar upside: the broken draw more souls from the kill
            const soulsEarned = Math.floor((state.enemyCreature.souls || 10) * playerScarMods.soulsMult);
            log.push(`${state.enemyCreature.name} defeated! Gained ${soulsEarned} souls.`);

            if (state.isBossFight) {
              return {
                ...state,
                screen: 'victory',
                souls: state.souls + soulsEarned,
                bossDefeated: state.isHollowWardenFight ? state.bossDefeated : true,
                hollowWardenDefeated: state.isHollowWardenFight ? true : state.hollowWardenDefeated,
                team: newTeam,
                activeCreatureIndex: survivorIndex,
                battleLog: log,
                ...bossVictoryTitleFields(state, newTeam)
              };
            }

            const grassEncounters = state.grassEncounters.map(e =>
              e.x === state.currentEncounter?.x && e.y === state.currentEncounter?.y
                ? { ...e, active: false }
                : e
            );

            if (state.currentSentinelId) {
              log.push('The sentinel crumbles. The way is open.');
            }
            if (state.currentFoeId) {
              log.push('The hunter falls. The halls are quieter now.');
            }

            return {
              ...state,
              screen: 'exploration',
              souls: state.souls + soulsEarned,
              enemy: null,
              enemyCreature: null,
              team: newTeam,
              activeCreatureIndex: survivorIndex,
              battleLog: log,
              grassEncounters,
              sentinelsDefeated: state.currentSentinelId
                ? [...(state.sentinelsDefeated || []), state.currentSentinelId]
                : state.sentinelsDefeated,
              isSentinelFight: false,
              currentSentinelId: null,
              foesDefeated: state.currentFoeId
                ? [...(state.foesDefeated || []), state.currentFoeId]
                : state.foesDefeated,
              currentFoeId: null
            };
          }

          return { ...state, team: newTeam, enemy: newEnemy, battleLog: log, turnPhase };
        }

        case 'BIND_ATTEMPT': {
          // Can't bind bosses
          if (state.isBossFight) {
            return { ...state, battleLog: [...state.battleLog, "Can't bind a boss!"] };
          }

          // Check if can afford
          if (state.souls < GAME_CONFIG.souls.bindCost) {
            return { ...state, battleLog: [...state.battleLog, "Not enough souls!"] };
          }

          let log = [...state.battleLog];
          const difficulty = getDifficulty(state);
          const captureChance = getCaptureChance(state.enemy.hp, state.enemy.maxHp, difficulty.captureBonus);
          const roll = Math.random() * 100;

          log.push(`Attempting soul bind... (${captureChance}% chance)`);

          // Deduct souls regardless of outcome
          const newSouls = state.souls - GAME_CONFIG.souls.bindCost;

          if (roll < captureChance) {
            // SUCCESS! Creature captured
            const capturedCreature = {
              id: state.enemyCreature.id.replace('wild', '').toLowerCase(),
              name: state.enemyCreature.name.replace('Wild ', ''),
              type: state.enemyCreature.type,
              maxHp: state.enemy.maxHp,
              maxStamina: state.enemy.maxStamina,
              hp: state.enemy.hp,
              stamina: state.enemy.stamina,
              scars: state.enemy.scars || [],
              winded: false,
              isGuarding: false,
              burnTurns: 0,
              poisonTurns: 0,
              chillTurns: 0,
              moves: []
            };

            // Fix the id and moves to match STARTERS based on type
            const typeToStarter = {
              fire: 'cindrath',
              water: 'marshveil',
              grass: 'thornwick',
              dark: 'umbravine',
              light: 'solrath'
            };
            capturedCreature.id = typeToStarter[state.enemyCreature.type] || 'cindrath';
            capturedCreature.moves = STARTERS[capturedCreature.id].moves;
            capturedCreature.nickname = null; // Will be set in nickname screen

            const grassEncounters = state.grassEncounters.map(e =>
              e.x === state.currentEncounter?.x && e.y === state.currentEncounter?.y
                ? { ...e, active: false }
                : e
            );

            // A bound sentinel leaves its post: the way opens just as if slain
            const boundSentinels = state.currentSentinelId
              ? [...(state.sentinelsDefeated || []), state.currentSentinelId]
              : state.sentinelsDefeated;
            if (state.currentSentinelId) {
              log.push('The sentinel abandons its post. The way is open.');
            }
            // A bound FOE stops patrolling for the same reason: it is yours now
            const boundFoes = state.currentFoeId
              ? [...(state.foesDefeated || []), state.currentFoeId]
              : state.foesDefeated;
            if (state.currentFoeId) {
              log.push('The hunter kneels. It hunts for you now.');
            }

            // Team full? Show release screen instead of nickname
            if (state.team.length >= GAME_CONFIG.souls.maxTeamSize) {
              log.push(`${capturedCreature.name} bound! But your team is full...`);
              return {
                ...state,
                screen: 'release',
                pendingCapture: capturedCreature,
                releaseMenuOpen: true,
                souls: newSouls,
                battleLog: log,
                grassEncounters,
                sentinelsDefeated: boundSentinels,
                isSentinelFight: false,
                currentSentinelId: null,
                foesDefeated: boundFoes,
                currentFoeId: null
              };
            }

            // Team has room - go straight to nickname
            log.push(state.playerName
              ? `${capturedCreature.name} answered ${state.playerName}'s call!`
              : `${capturedCreature.name} answered your call!`);
            return {
              ...state,
              screen: 'nickname',
              pendingCreature: capturedCreature,
              souls: newSouls,
              battleLog: log,
              grassEncounters,
              sentinelsDefeated: boundSentinels,
              isSentinelFight: false,
              currentSentinelId: null,
              foesDefeated: boundFoes,
              currentFoeId: null
            };
          } else {
            // FAILED - enemy gets a free attack
            const failMessages = [
              "They said no. Respect boundaries.",
              state.playerName ? `${state.playerName}'s call went unanswered.` : "Your call went unanswered.",
              "The binding failed. They resist."
            ];
            log.push(failMessages[Math.floor(Math.random() * failMessages.length)]);

            // Enemy retaliates
            return {
              ...state,
              souls: newSouls,
              battleLog: log,
              turnPhase: 'enemy'
            };
          }
        }

        case 'RELEASE_FOR_CAPTURE': {
          if (!state.pendingCapture) return state;
          if (action.releaseIndex < 0 || action.releaseIndex >= state.team.length) return state;

          const releasedCreature = state.team[action.releaseIndex];
          const newTeam = state.team.filter((_, i) => i !== action.releaseIndex);

          // Adjust activeCreatureIndex if needed
          let newActiveIndex = state.activeCreatureIndex;
          if (action.releaseIndex < state.activeCreatureIndex) {
            newActiveIndex = state.activeCreatureIndex - 1;
          } else if (action.releaseIndex === state.activeCreatureIndex) {
            newActiveIndex = 0;
          }

          return {
            ...state,
            screen: 'nickname',
            team: newTeam,
            activeCreatureIndex: Math.min(newActiveIndex, newTeam.length - 1),
            pendingCreature: state.pendingCapture,
            pendingCapture: null,
            releaseMenuOpen: false,
            battleLog: [...state.battleLog, `${releasedCreature.nickname || releasedCreature.name} was released forever.`]
          };
        }

        case 'CANCEL_CAPTURE': {
          if (!state.pendingCapture) return state;

          return {
            ...state,
            screen: 'exploration',
            pendingCapture: null,
            releaseMenuOpen: false,
            enemy: null,
            enemyCreature: null,
            battleLog: [...state.battleLog, `${state.pendingCapture.name} escaped while you hesitated.`]
          };
        }

        case 'SET_NICKNAME': {
          if (!state.pendingCreature) return state;

          const creature = {
            ...state.pendingCreature,
            nickname: action.nickname || null
          };

          return {
            ...state,
            screen: 'exploration',
            team: [...state.team, creature],
            pendingCreature: null,
            enemy: null,
            enemyCreature: null
          };
        }

        case 'RENAME_CREATURE': {
          const newTeam = [...state.team];
          newTeam[action.index] = {
            ...newTeam[action.index],
            nickname: action.nickname || null
          };
          return {
            ...state,
            team: newTeam
          };
        }


        case 'ENEMY_TURN': {
          let newTeam = [...state.team];
          let newEnemy = { ...state.enemy };
          let log = [...state.battleLog];
          let activeCreature = newTeam[state.activeCreatureIndex];
          const activeBase = STARTERS[activeCreature.id];
          const enemyDifficulty = getDifficulty(state);
          const { maxHp, maxStamina } = applyScars(activeCreature, activeBase, enemyDifficulty.hollowedThreshold);

          activeCreature = {
            ...activeCreature,
            stamina: Math.min(activeCreature.stamina + GAME_CONFIG.combat.staminaPerTurnRecovery, maxStamina)
          };

          if (activeCreature.stamina >= GAME_CONFIG.combat.windedThreshold) {
            activeCreature.winded = false;
          }

          // Status state BEFORE ticks, so a killing tick still counts as its cause
          const wasBurning = activeCreature.burnTurns > 0;
          const wasPoisoned = activeCreature.poisonTurns > 0;
          const wasChilled = activeCreature.chillTurns > 0;
          const playerMods = getScarModifiers(activeCreature);

          // Process burn damage
          if (activeCreature.burnTurns > 0) {
            activeCreature.hp = Math.max(0, activeCreature.hp - GAME_CONFIG.statusFx.burnDamage);
            activeCreature.burnTurns--;
            log.push(`${activeCreature.nickname || activeCreature.name} takes ${GAME_CONFIG.statusFx.burnDamage} burn damage!`);
          }

          // Process poison damage
          if (activeCreature.poisonTurns > 0) {
            activeCreature.hp = Math.max(0, activeCreature.hp - GAME_CONFIG.statusFx.poisonDamage);
            activeCreature.poisonTurns--;
            log.push(`${activeCreature.nickname || activeCreature.name} takes ${GAME_CONFIG.statusFx.poisonDamage} poison damage!`);
          }

          // Tick down chill (the freeze roll happens when the player acts, in SELECT_MOVE)
          if (activeCreature.chillTurns > 0) {
            activeCreature.chillTurns--;
          }

          // Cursed scar: the darkness gnaws each round
          if (playerMods.curseDot > 0) {
            activeCreature.hp = Math.max(0, activeCreature.hp - playerMods.curseDot);
            log.push(`The curse gnaws at ${activeCreature.nickname || activeCreature.name} for ${playerMods.curseDot} damage.`);
          }

          if (state.arenaEffect === 'scorchedEarth' && activeBase.type !== 'fire') {
            activeCreature.hp = Math.max(0, activeCreature.hp - GAME_CONFIG.statusFx.scorchedEarthDamage);
            log.push(`Scorched Earth burns ${activeCreature.nickname || activeCreature.name} for ${GAME_CONFIG.statusFx.scorchedEarthDamage} damage!`);
          }

          // Fractured Aura damages non-Dark/Light creatures
          if (state.arenaEffect === 'fracturedAura' && activeBase.type !== 'dark' && activeBase.type !== 'light') {
            activeCreature.hp = Math.max(0, activeCreature.hp - GAME_CONFIG.statusFx.fracturedAuraDamage);
            log.push(`Fractured Aura tears at ${activeCreature.nickname || activeCreature.name} for ${GAME_CONFIG.statusFx.fracturedAuraDamage} damage!`);
          }

          newTeam[state.activeCreatureIndex] = activeCreature;

          if (activeCreature.hp <= 0) {
            return handleCreatureFaint(state, newTeam, newEnemy, log, {
              isBoss: state.isBossFight,
              wasPoisoned,
              wasChilled,
              wasWinded: activeCreature.winded,
              byStatus: wasBurning ? 'burn' : null,
              killerType: state.arenaEffect === 'scorchedEarth' ? 'fire' :
                          state.arenaEffect === 'fracturedAura' ? 'darklight' : null
            });
          }

          newEnemy.stamina = Math.min(newEnemy.stamina + GAME_CONFIG.combat.staminaPerTurnRecovery, state.enemyCreature.maxStamina);
          newEnemy.winded = false;

          // Process enemy status effects
          if (newEnemy.burnTurns > 0) {
            newEnemy.hp = Math.max(0, newEnemy.hp - GAME_CONFIG.statusFx.burnDamage);
            newEnemy.burnTurns--;
            log.push(`${state.enemyCreature.name} takes ${GAME_CONFIG.statusFx.burnDamage} burn damage!`);
          }
          if (newEnemy.poisonTurns > 0) {
            newEnemy.hp = Math.max(0, newEnemy.hp - GAME_CONFIG.statusFx.poisonDamage);
            newEnemy.poisonTurns--;
            log.push(`${state.enemyCreature.name} takes ${GAME_CONFIG.statusFx.poisonDamage} poison damage!`);
          }
          const enemyMods = getScarModifiers(newEnemy);
          if (enemyMods.curseDot > 0) {
            newEnemy.hp = Math.max(0, newEnemy.hp - enemyMods.curseDot);
            log.push(`The curse gnaws at ${state.enemyCreature.name} for ${enemyMods.curseDot} damage.`);
          }

          // Chill ticks down on the enemy's own turn, and can freeze it solid.
          // Mirrors the player's chill: the tick always happens, the freeze roll
          // decides whether the action is lost.
          let enemyFrozen = false;
          if (newEnemy.chillTurns > 0) {
            newEnemy.chillTurns--;
            if (Math.random() < GAME_CONFIG.statusFx.chillSkipChance) {
              enemyFrozen = true;
            }
          }

          // Check if enemy died from status effects
          if (newEnemy.hp <= 0) {
            const soulsEarned = Math.floor((state.enemyCreature.souls || 10) * playerMods.soulsMult);
            log.push(`${state.enemyCreature.name} defeated! Gained ${soulsEarned} souls.`);
            if (state.isBossFight) {
              return {
                ...state,
                screen: 'victory',
                souls: state.souls + soulsEarned,
                bossDefeated: state.isHollowWardenFight ? state.bossDefeated : true,
                hollowWardenDefeated: state.isHollowWardenFight ? true : state.hollowWardenDefeated,
                team: newTeam,
                battleLog: log,
                ...bossVictoryTitleFields(state, newTeam)
              };
            }
            if (state.currentSentinelId) {
              log.push('The sentinel crumbles. The way is open.');
            }
            return {
              ...state,
              screen: 'exploration',
              souls: state.souls + soulsEarned,
              enemy: null,
              team: newTeam,
              battleLog: log,
              sentinelsDefeated: state.currentSentinelId
                ? [...(state.sentinelsDefeated || []), state.currentSentinelId]
                : state.sentinelsDefeated,
              isSentinelFight: false,
              currentSentinelId: null,
              foesDefeated: state.currentFoeId
                ? [...(state.foesDefeated || []), state.currentFoeId]
                : state.foesDefeated,
              currentFoeId: null
            };
          }

          // Frozen solid: the enemy loses its action entirely. Checked before the
          // telegraph machine, so a frozen boss stays wound up and its blow lands
          // next turn rather than being skipped.
          if (enemyFrozen) {
            log.push(`${state.enemyCreature.name} is frozen and can't move!`);
            newTeam[state.activeCreatureIndex] = activeCreature;
            return {
              ...state,
              team: newTeam,
              enemy: newEnemy,
              battleLog: log,
              turnPhase: state.pendingMove ? 'playerForced' : 'player'
            };
          }

          // Get available moves based on boss type and phase
          let bossData = state.isHollowWardenFight ? BOSS.hollowWarden : BOSS.obsidianHound;
          let availableMoves = (state.bossPhase === 2 ?
            bossData.phase2Moves : state.enemyCreature.moves)
            .filter(m => m.cost <= newEnemy.stamina);

          if (availableMoves.length === 0) {
            availableMoves = [{ name: 'Rest', cost: 0, damage: 0, effect: 'rest' }];
          }

          const bossCfg = GAME_CONFIG.bosses;
          let nextTelegraph = state.bossTelegraph || null;
          let telegraphCd = state.bossTelegraphCooldown || 0;
          let releasingTelegraph = null;

          // --- Telegraph state machine (bosses only) ---
          // Turn A: boss winds up (announces, does nothing else).
          // Turn B: the blow lands, doubled - unless the player guarded, which
          // blunts it to a quarter. This is the fight you can learn.
          if (state.isBossFight && bossData.telegraphMove) {
            if (nextTelegraph) {
              releasingTelegraph = { ...bossData.telegraphMove };
              nextTelegraph = null;
              telegraphCd = bossCfg.telegraphCooldown;
            } else {
              if (telegraphCd > 0) telegraphCd -= 1;
              const canWindUp = telegraphCd <= 0 &&
                newEnemy.stamina >= bossData.telegraphMove.cost &&
                newEnemy.hp > 0;
              if (canWindUp) {
                log.push(bossData.telegraphMove.windupText);
                log.push('(GUARD to brace for it!)');
                newTeam[state.activeCreatureIndex] = activeCreature;
                return {
                  ...state,
                  team: newTeam,
                  enemy: newEnemy,
                  battleLog: log,
                  bossTelegraph: bossData.telegraphMove.name,
                  bossTelegraphCooldown: telegraphCd,
                  turnPhase: state.pendingMove ? 'playerForced' : 'player'
                };
              }
            }
          }

          let selectedMove;
          if (releasingTelegraph) {
            selectedMove = releasingTelegraph;
          } else if (state.isBossFight) {
            const playerHpPercent = activeCreature.hp / (maxHp || 1);
            if (state.isHollowWardenFight) {
              // Hollow Warden AI
              if (state.bossPhase === 2 && playerHpPercent < 0.4) {
                const despVoid = availableMoves.find(m => m.name === 'Desperate Void');
                if (despVoid) selectedMove = despVoid;
              }
              if (!selectedMove && activeCreature.stamina > 12) {
                const voidGrasp = availableMoves.find(m => m.name === 'Void Grasp');
                if (voidGrasp) selectedMove = voidGrasp;
              }
            } else {
              // Obsidian Hound AI
              if (state.bossPhase === 2 && playerHpPercent < 0.4) {
                const despFang = availableMoves.find(m => m.name === 'Desperation Fang');
                if (despFang) selectedMove = despFang;
              }
              if (!selectedMove && playerHpPercent > 0.7) {
                const flameWall = availableMoves.find(m => m.name === 'Flame Wall');
                if (flameWall) selectedMove = flameWall;
              }
            }
          }

          if (!selectedMove) {
            const attackMoves = availableMoves.filter(m => m.damage > 0);
            selectedMove = attackMoves.length > 0
              ? attackMoves[Math.floor(Math.random() * attackMoves.length)]
              : availableMoves[0];
          }

          if (selectedMove.effect === 'rest') {
            // Base only: the enemy's own per-round tick completes the +12
            newEnemy.stamina = Math.min(newEnemy.stamina + GAME_CONFIG.combat.restRecoveryBase, state.enemyCreature.maxStamina);
            log.push(`${state.enemyCreature.name} rests.`);
          } else if (selectedMove.effect === 'guard') {
            newEnemy.isGuarding = true;
            newEnemy.stamina -= selectedMove.cost;
            log.push(`${state.enemyCreature.name} guards.`);
          } else if (enemyMods.missChance > 0 && Math.random() < enemyMods.missChance) {
            // Blinded enemies can whiff their attacks
            newEnemy.stamina -= selectedMove.cost;
            log.push(`${state.enemyCreature.name}'s ${selectedMove.name} misses! (Blinded)`);
          } else {
            const difficulty = getDifficulty(state);
            const damageMult = state.isBossFight ? difficulty.bossDamageMult : difficulty.wildDamageMult;
            const wasGuarding = activeCreature.isGuarding;
            // Telegraphs resolve their own guard math, so strip the standard
            // guard reduction out of the base calc to avoid double-dipping.
            const damageTarget = selectedMove.telegraph
              ? { ...activeCreature, isGuarding: false }
              : activeCreature;
            let damage = calculateDamage(selectedMove, newEnemy, damageTarget,
              state.enemyCreature, activeBase, damageMult);

            // A telegraphed blow hits like a truck - unless you braced for it
            if (selectedMove.telegraph) {
              log.push(selectedMove.releaseText);
              damage = wasGuarding
                ? Math.max(1, Math.floor(damage * bossCfg.telegraphGuardReduction))
                : Math.floor(damage * bossCfg.telegraphDamageMult);
            }

            activeCreature.hp = Math.max(0, activeCreature.hp - damage);
            activeCreature.isGuarding = false;
            // Telegraph releases bypass the affordability filter, so a drained
            // boss could otherwise go negative
            newEnemy.stamina = Math.max(0, newEnemy.stamina - selectedMove.cost);

            log.push(`${state.enemyCreature.name} used ${selectedMove.name}! ${damage} damage.`);

            if (selectedMove.telegraph) {
              log.push(wasGuarding
                ? `${activeCreature.nickname || activeCreature.name} braced in time. The blow glances off.`
                : `${activeCreature.nickname || activeCreature.name} took it full force!`);
            }

            // Apply status effects from enemy attacks (scar immunities block re-marking)
            if (selectedMove.effect === 'burn' && (!activeCreature.burnTurns || activeCreature.burnTurns === 0)) {
              if (playerMods.immuneBurn) {
                log.push(`${activeCreature.nickname || activeCreature.name} is already Burned. Flames find nothing left to take.`);
              } else {
                activeCreature.burnTurns = GAME_CONFIG.statusFx.burnDuration;
                log.push(`${activeCreature.nickname || activeCreature.name} is burning!`);
              }
            }
            if (selectedMove.effect === 'poison' && (!activeCreature.poisonTurns || activeCreature.poisonTurns === 0)) {
              if (playerMods.immunePoison) {
                log.push(`${activeCreature.nickname || activeCreature.name} is Withered. Poison cannot touch it.`);
              } else {
                activeCreature.poisonTurns = GAME_CONFIG.statusFx.poisonDuration;
                log.push(`${activeCreature.nickname || activeCreature.name} is poisoned!`);
              }
            }
            if (selectedMove.effect === 'chill' && (!activeCreature.chillTurns || activeCreature.chillTurns === 0)) {
              if (playerMods.immuneChill) {
                log.push(`${activeCreature.nickname || activeCreature.name} is Frostbitten. The cold holds no more fear.`);
              } else {
                activeCreature.chillTurns = GAME_CONFIG.statusFx.chillDuration;
                log.push(`${activeCreature.nickname || activeCreature.name} is chilled!`);
              }
            }

            if (selectedMove.effect === 'recoil') {
              newEnemy.hp = Math.max(0, newEnemy.hp - selectedMove.recoilDamage);
              log.push(`${state.enemyCreature.name} takes ${selectedMove.recoilDamage} recoil!`);
            }

            // Void Grasp drains stamina
            if (selectedMove.effect === 'drainStamina') {
              activeCreature.stamina = Math.max(0, activeCreature.stamina - selectedMove.drainAmount);
              log.push(`${activeCreature.nickname || activeCreature.name} loses ${selectedMove.drainAmount} stamina!`);
            }

            if (newEnemy.stamina < GAME_CONFIG.combat.windedThreshold) {
              newEnemy.winded = true;
              log.push(`${state.enemyCreature.name} is winded!`);
            }
          }

          newTeam[state.activeCreatureIndex] = activeCreature;

          if (newEnemy.hp <= 0) {
            const soulsEarned = Math.floor((state.enemyCreature.souls || 10) * playerMods.soulsMult);
            log.push(`${state.enemyCreature.name} defeated! Gained ${soulsEarned} souls.`);

            if (state.isBossFight) {
              return {
                ...state,
                screen: 'victory',
                souls: state.souls + soulsEarned,
                bossDefeated: state.isHollowWardenFight ? state.bossDefeated : true,
                hollowWardenDefeated: state.isHollowWardenFight ? true : state.hollowWardenDefeated,
                team: newTeam,
                battleLog: log,
                ...bossVictoryTitleFields(state, newTeam)
              };
            }

            if (state.currentSentinelId) {
              log.push('The sentinel crumbles. The way is open.');
            }
            return {
              ...state,
              screen: 'exploration',
              souls: state.souls + soulsEarned,
              enemy: null,
              team: newTeam,
              battleLog: log,
              sentinelsDefeated: state.currentSentinelId
                ? [...(state.sentinelsDefeated || []), state.currentSentinelId]
                : state.sentinelsDefeated,
              isSentinelFight: false,
              currentSentinelId: null,
              foesDefeated: state.currentFoeId
                ? [...(state.foesDefeated || []), state.currentFoeId]
                : state.foesDefeated,
              currentFoeId: null
            };
          }

          if (activeCreature.hp <= 0) {
            const enemyFaster = getEffectiveSpeed(newEnemy, state.enemyCreature) >
                                getEffectiveSpeed(activeCreature, activeBase);
            // Carry the resolved telegraph state through the faint, or a KO on
            // release would leave it primed and the boss would chain it forever.
            const faintState = { ...state, bossTelegraph: nextTelegraph, bossTelegraphCooldown: telegraphCd };
            return handleCreatureFaint(faintState, newTeam, newEnemy, log, {
              isBoss: state.isBossFight,
              killerType: state.enemyCreature.type,
              physical: selectedMove.damage > 0 && !selectedMove.effect,
              wasPoisoned: wasPoisoned || activeCreature.poisonTurns > 0,
              wasChilled: wasChilled || activeCreature.chillTurns > 0,
              wasWinded: activeCreature.winded,
              enemyFaster
            });
          }

          return {
            ...state,
            team: newTeam,
            enemy: newEnemy,
            battleLog: log,
            bossTelegraph: nextTelegraph,
            bossTelegraphCooldown: telegraphCd,
            // A faster enemy already acted; the player's chosen move now resolves
            turnPhase: state.pendingMove ? 'playerForced' : 'player'
          };
        }

        case 'SWITCH_CREATURE': {
          if (state.team[action.index].hp <= 0) return state;
          // In battle, switching is only legal while waiting for player input
          if (state.screen === 'battle' && state.turnPhase !== 'player') return state;
          return {
            ...state,
            activeCreatureIndex: action.index,
            battleLog: [...state.battleLog, `Go, ${state.team[action.index].name}!`]
          };
        }

        case 'RESPAWN': {
          const respawnDifficulty = getDifficulty(state);
          const team = state.team.map(creature => {
            const baseData = STARTERS[creature.id];
            const { maxHp, maxStamina } = applyScars(creature, baseData, respawnDifficulty.hollowedThreshold);
            return {
              ...creature,
              hp: creature.hp === 0 ? 1 : Math.max(creature.hp, 1),
              stamina: maxStamina,
              winded: false,
              burnTurns: 0,
              poisonTurns: 0,
              chillTurns: 0,
              isGuarding: false
            };
          });

          return {
            ...state,
            screen: 'exploration',
            currentMap: state.lastBonfire.map,
            playerPos: { ...state.lastBonfire.pos },
            visitedTiles: revealAround(
              state.visitedTiles, state.lastBonfire.map,
              state.lastBonfire.pos.x, state.lastBonfire.pos.y,
              GAME_CONFIG.cartography.revealRadius, MAPS_BY_ID[state.lastBonfire.map]
            ),
            team,
            activeCreatureIndex: Math.max(0, team.findIndex(c => c.hp > 0)),
            enemy: null,
            enemyCreature: null,
            battleLog: [],
            turnPhase: 'player',
            pendingMove: null,
            bossPhase: 1,
            arenaEffect: null,
            isBossFight: false,
            isHollowWardenFight: false,
            isSentinelFight: false,
            currentSentinelId: null,
            // Death resets patrols: the corpse run is past fresh posts
            foePositions: getInitialFoePositions(),
            currentFoeId: null,
            bossTelegraph: null,
            bossTelegraphCooldown: 0,
            diedToBoss: false,
            bonfireMenuOpen: false,
            withdrawMenuOpen: false,
            depositMenuOpen: false,
            kindleMenuOpen: false,
            titlesMenuOpen: false
          };
        }

        case 'CONTINUE_FROM_VICTORY': {
          // Back to the world after a boss falls: the Hollow Deep opens behind
          // the Hound, the Labyrinth behind the Warden. Clear every battle flag
          // so later wild fights don't inherit boss arenas, and save so the
          // gate-opening progress can't be lost to a page refresh.
          const newState = {
            ...state,
            screen: 'exploration',
            enemy: null,
            enemyCreature: null,
            battleLog: [],
            turnPhase: 'player',
            pendingMove: null,
            bossPhase: 1,
            arenaEffect: null,
            isBossFight: false,
            isHollowWardenFight: false,
            isSentinelFight: false,
            currentSentinelId: null,
            currentFoeId: null,
            bossTelegraph: null,
            bossTelegraphCooldown: 0
          };
          saveGame(newState);
          return newState;
        }

        case 'RESTART': {
          return {
            ...initialState,
            hasSeenPrologue: true, // Skip prologue on subsequent playthroughs
            // Titles are meta-unlocks: they survive NEW GAME+
            titles: state.titles,
            activeTitle: state.activeTitle
          };
        }

        case 'SHOW_CREDITS': {
          return {
            ...state,
            screen: 'credits'
          };
        }

        case 'RETURN_TO_TITLE': {
          return initialState;
        }

        case 'MANUAL_SAVE': {
          const success = saveGame(state);
          return {
            ...state,
            saveNotification: success ? 'Progress saved.' : 'Save failed!'
          };
        }

        case 'LOAD_GAME': {
          const saveData = action.saveData;
          if (!saveData) return state;
          // A truncated or hand-edited save must fail loudly at the title
          // screen, not throw mid-reducer on a missing core field
          if (!saveData.currentMap || !MAPS_BY_ID[saveData.currentMap] ||
              !saveData.playerPos || typeof saveData.playerPos.x !== 'number' ||
              !Array.isArray(saveData.team) || saveData.team.length === 0) {
            return {
              ...state,
              saveNotification: 'Save data is damaged and could not be loaded.'
            };
          }

          return {
            ...initialState,
            screen: 'exploration',
            difficulty: saveData.difficulty || 'scarred',
            playerName: saveData.playerName || 'Ashen One',
            playerAppearance: saveData.playerAppearance || 'other',
            currentMap: saveData.currentMap,
            playerPos: saveData.playerPos,
            playerDir: saveData.playerDir,
            team: saveData.team,
            activeCreatureIndex: saveData.activeCreatureIndex,
            souls: saveData.souls,
            bankedSouls: saveData.bankedSouls,
            droppedSouls: saveData.droppedSouls,
            bossDefeated: saveData.bossDefeated,
            hollowWardenDefeated: saveData.hollowWardenDefeated || false,
            shortcutUnlocked: saveData.shortcutUnlocked,
            tollsPaid: saveData.tollsPaid || [],
            sentinelsDefeated: saveData.sentinelsDefeated || [],
            grassEncounters: saveData.grassEncounters || initialState.grassEncounters,
            lastBonfire: saveData.lastBonfire,
            hasSeenPrologue: saveData.hasSeenPrologue,
            playTime: saveData.playTime || 0,
            titles: saveData.titles || [],
            activeTitle: saveData.activeTitle || null,
            cluesFound: saveData.cluesFound || [],
            secretDoorRevealed: saveData.secretDoorRevealed || false,
            gatheredPoints: saveData.gatheredPoints || [],
            foesDefeated: saveData.foesDefeated || [],
            // Patrols are never saved: every load starts them at their posts
            foePositions: getInitialFoePositions(),
            // Old saves have no chart; reveal the loaded position so nobody
            // wakes up fully blind. Recharting the rest is on-theme.
            visitedTiles: revealAround(
              saveData.visitedTiles || {}, saveData.currentMap,
              saveData.playerPos.x, saveData.playerPos.y,
              GAME_CONFIG.cartography.revealRadius, MAPS_BY_ID[saveData.currentMap]
            ),
            saveNotification: 'Journey resumed.'
          };
        }

        case 'NEW_GAME_CONFIRMED': {
          deleteSaveData();
          return initialState;
        }

        case 'UPDATE_PLAY_TIME': {
          return {
            ...state,
            playTime: state.playTime + action.delta
          };
        }

        case 'EARN_TITLE': {
          const titleId = action.titleId;
          if (state.titles.includes(titleId)) {
            return state;
          }
          const titleData = TITLES.find(t => t.id === titleId);
          const titleName = titleData ? titleData.name : titleId;
          return {
            ...state,
            titles: [...state.titles, titleId],
            saveNotification: `Title earned: ${titleName}`
          };
        }

        case 'SET_ACTIVE_TITLE': {
          return {
            ...state,
            activeTitle: action.titleId
          };
        }

        case 'CONFIRM_ENCOUNTER': {
          if (!state.pendingEncounter) return state;
          const { wildData, actualMaxHp, actualMaxStamina, encounter } = state.pendingEncounter;
          return {
            ...state,
            screen: 'battle',
            enemy: {
              ...wildData,
              maxHp: actualMaxHp,
              maxStamina: actualMaxStamina,
              hp: actualMaxHp,
              stamina: actualMaxStamina,
              winded: false,
              isGuarding: false
            },
            enemyCreature: wildData,
            battleLog: [`A ${wildData.name} appeared!`],
            turnPhase: 'player',
            pendingMove: null,
            bossTelegraph: null,
            bossTelegraphCooldown: 0,
            bossPhase: 1,
            arenaEffect: null,
            isBossFight: false,
            isHollowWardenFight: false,
            currentEncounter: encounter,
            pendingEncounter: null
          };
        }

        case 'FLEE_ENCOUNTER': {
          if (!state.pendingEncounter) return state;
          const { encounter } = state.pendingEncounter;
          // Mark grass as alerted - can't flee twice
          const grassEncounters = state.grassEncounters.map(e =>
            e.x === encounter.x && e.y === encounter.y && e.map === state.currentMap
              ? { ...e, alerted: true }
              : e
          );
          // Fleeing is never free: the flame takes its cut of carried souls
          // (capped at what you carry, so it can't go negative)
          const fleeCost = Math.min(GAME_CONFIG.souls.fleeCost || 0, state.souls);
          return {
            ...state,

    const LightingOverlay = React.memo(function LightingOverlay({ map, mapData }) {
      const palette = AREA_PALETTES[map] || AREA_PALETTES.ashenPath;
      const lightColor = palette.lightColor || 'rgba(255, 200, 120, 0.2)';
      const cols = mapData[0].length;
      const rows = mapData.length;
      const gradients = [];
      for (var y = 0; y < rows; y++) {
        for (var x = 0; x < cols; x++) {
          var ch = mapData[y][x];
          if (ch === 'B' || ch === 'T') {
            var cx = ((x + 0.5) / cols * 100).toFixed(1);
            var cy = ((y + 0.5) / rows * 100).toFixed(1);
            if (ch === 'B') {
              // Primary bonfire glow: 50% larger than before
              gradients.push('radial-gradient(circle at ' + cx + '% ' + cy + '%, ' + lightColor + ' 0%, transparent 27%)');
              // Outer ambient halo: faint warmth extending two tile radii
              var outerGlow = lightColor.replace(/[\d.]+\)$/, function(m) {
                return (parseFloat(m) * 0.4).toFixed(2) + ')';
              });
              gradients.push('radial-gradient(circle at ' + cx + '% ' + cy + '%, ' + outerGlow + ' 0%, transparent 40%)');
            } else {
              var radius = '12%';
              var strength = lightColor.replace(/[\d.]+\)$/, function(m) {
                return (parseFloat(m) * 0.6).toFixed(2) + ')';
              });
              gradients.push('radial-gradient(circle at ' + cx + '% ' + cy + '%, ' + strength + ' 0%, transparent ' + radius + ')');

          <div style={{ ...corner({ bottom: '2px', left: '2px' }), borderBottom: edge, borderLeft: edge }}/>

        </>
      );

    // Overworld walk pacing. Playtests called 150ms-per-tile walking "boring";
    // held keys drive their own repeat so there is no OS repeat-delay hitch.
    const AUTO_PATH_STEP_MS = 100;
    const HELD_MOVE_MS = 110;

    function Exploration({ state, dispatch }) {
      const map = state.currentMap === 'ashenPath' ? ASHEN_PATH : state.currentMap === 'hollowDeep' ? HOLLOW_DEEP : state.currentMap === 'labyrinth' ? LABYRINTH : FALLEN_KEEP;
      const mapName = state.currentMap === 'ashenPath' ? 'Ashen Path' : state.currentMap === 'hollowDeep' ? 'The Hollow Deep' : state.currentMap === 'labyrinth' ? 'The Labyrinth' : 'Fallen Keep';
      const ghost = loadGhost(); // Load once for ghost marker display

      // Cartography: this map's chart, plus last render's chart so tiles that
      // just came out of the fog can play their reveal fade exactly once.
      const fogEnabled = GAME_CONFIG.cartography.enabled;
      const chart = state.visitedTiles[state.currentMap] || {};
      const prevChartRef = useRef({ map: state.currentMap, chart });
      useEffect(() => {
        prevChartRef.current = { map: state.currentMap, chart };
      });
      // On map entry the previous chart belongs to another map; suppress the
      // mass reveal flash by treating everything as already-known
      const prevChart = prevChartRef.current.map === state.currentMap ? prevChartRef.current.chart : chart;

      // Living FOEs on this map, paired with their current patrol position
      const liveFoes = GAME_CONFIG.foes.enabled
        ? FOES.filter(f => f.area === state.currentMap && !(state.foesDefeated || []).includes(f.id))
            .map(f => ({ foe: f, pos: (state.foePositions || {})[f.id] }))
            .filter(f => f.pos)
        : [];
      // Closest living FOE drives the danger drone and cancels tap-walking
      const foeThreatRange = liveFoes.reduce((closest, f) => {
        const d = Math.max(Math.abs(f.pos.x - state.playerPos.x), Math.abs(f.pos.y - state.playerPos.y));
        return d < closest ? d : closest;
      }, Infinity);

      // A hunter nearby: the music thickens and tap-to-walk hands control
      // back, so nobody auto-walks into a FOE they never saw coming
      const foeNear = GAME_CONFIG.foes.enabled && foeThreatRange <= GAME_CONFIG.foes.autoPathCancelRange;

      // Confirmation for the risky ALL presets at the bonfire (deposit/withdraw)
      const [confirmDialog, setConfirmDialog] = useState(null);

      // Track movement for walk animation
      const [isMoving, setIsMoving] = useState(false);
      const prevPosRef = useRef({ x: state.playerPos.x, y: state.playerPos.y });
      const moveTimeoutRef = useRef(null);
      const autoPathRef = useRef(null);
      const [destFlash, setDestFlash] = useState(null);
      const [dustPuffs, setDustPuffs] = useState([]);
      const heldMoveRef = useRef(null);

      // Cancel any active auto-path
      const cancelAutoPath = useCallback(() => {
        if (autoPathRef.current) {
          clearTimeout(autoPathRef.current.timerId);
          autoPathRef.current = null;
        }
        setDestFlash(null);
      }, []);

      // Stop held-key repeat movement
      const stopHeldMove = useCallback(() => {
        if (heldMoveRef.current) {
          clearInterval(heldMoveRef.current.timerId);
          heldMoveRef.current = null;
        }
      }, []);

      // Detect when player position changes and trigger walk animation
      useEffect(() => {
        const posChanged = prevPosRef.current.x !== state.playerPos.x ||
                          prevPosRef.current.y !== state.playerPos.y;

        if (posChanged) {
          setIsMoving(true);
          // Soft area-flavored footstep; the SfxManager throttles itself so
          // held-key movement does not machine-gun
          playSfx('footstep', {
            area: state.currentMap,
            alt: (state.playerPos.x + state.playerPos.y) % 2 === 0
          });
          // Kick up a dust puff on the tile just left behind
          const puff = {
            x: prevPosRef.current.x,
            y: prevPosRef.current.y,
            id: `${prevPosRef.current.x},${prevPosRef.current.y},${Date.now()}`
          };
          setDustPuffs(prev => [...prev.slice(-5), puff]);
          setTimeout(() => {
            setDustPuffs(prev => prev.filter(p => p.id !== puff.id));
          }, 500);
          prevPosRef.current = { x: state.playerPos.x, y: state.playerPos.y };

          // Clear any existing timeout
          if (moveTimeoutRef.current) {
            clearTimeout(moveTimeoutRef.current);
          }

          // Stop moving animation after 200ms of no movement
          moveTimeoutRef.current = setTimeout(() => {
            setIsMoving(false);
          }, 200);
        }

        return () => {
          if (moveTimeoutRef.current) {
            clearTimeout(moveTimeoutRef.current);
          }
        };
      }, [state.playerPos.x, state.playerPos.y]);

      // Auto-path: walk tile-by-tile to a tapped destination
      const startAutoPath = useCallback((path) => {
        cancelAutoPath();
        if (path.length === 0) return;
        const dest = path[path.length - 1];
        setDestFlash({ x: dest.x, y: dest.y });

        // Pre-compute dx/dy steps from current position through path
        const steps = [];
        let prevX = state.playerPos.x;
        let prevY = state.playerPos.y;
        for (let i = 0; i < path.length; i++) {
          steps.push({ dx: path[i].x - prevX, dy: path[i].y - prevY });
          prevX = path[i].x;
          prevY = path[i].y;
        }

        autoPathRef.current = { steps: steps, stepIndex: 0, timerId: null };

        const executeNextStep = () => {
          const ap = autoPathRef.current;
          if (!ap || ap.stepIndex >= ap.steps.length) {
            // Done walking
            autoPathRef.current = null;
            setDestFlash(null);
            return;
          }
          const step = ap.steps[ap.stepIndex];
          dispatch({ type: 'MOVE_PLAYER', dx: step.dx, dy: step.dy });
          ap.stepIndex++;
          if (ap.stepIndex < ap.steps.length) {
            ap.timerId = setTimeout(executeNextStep, AUTO_PATH_STEP_MS);
          } else {
            // Final step dispatched, clean up
            autoPathRef.current = null;
            setDestFlash(null);
          }
        };

        executeNextStep();
      }, [cancelAutoPath, dispatch, state.playerPos.x, state.playerPos.y]);

      // Cancel auto-path on unmount (screen change to encounter/battle)
      useEffect(() => {
        return () => cancelAutoPath();
      }, [cancelAutoPath]);

      // Cancel auto-path on map change (gate transitions)
      useEffect(() => {
        cancelAutoPath();
      }, [state.currentMap, cancelAutoPath]);

      // Cancel walking when an examine overlay opens (sealed doors, lore), or a
      // queued step could pay a door toll AND start the boss in one tap/hold
      useEffect(() => {
        if (state.examineText) {
          cancelAutoPath();
          stopHeldMove();
        }
      }, [state.examineText, cancelAutoPath, stopHeldMove]);

      // A hunter closes in: hand tap-walkers back their control (held keys
      // are left alone, those players are already steering) and thicken the
      // music. Approaching a FOE should be a decision, not a cutscene.
      useEffect(() => {
        if (foeNear) cancelAutoPath();
        musicManager.setDanger(foeNear && state.screen === 'exploration');
      }, [foeNear, state.screen, cancelAutoPath]);

      // Leaving exploration (battle, death, title) must not strand the drone
      useEffect(() => {
        return () => musicManager.setDanger(false);
      }, []);

      const handleKeyDown = useCallback((e) => {
        const key = e.key.toLowerCase();
        let dx = 0, dy = 0;

        // Close examine overlay first if open
        if (state.examineText && (key === 'x' || key === 'escape' || key === 'enter' || key === 'e')) {
          cancelAutoPath();
          dispatch({ type: 'CLOSE_EXAMINE' });
          return;
        }

        if (key === 'escape') {
          cancelAutoPath();
          return; // Let App-level handler open pause menu
        }
        else if (key === 'arrowup' || key === 'w') dy = -1;
        else if (key === 'arrowdown' || key === 's') dy = 1;
        else if (key === 'arrowleft' || key === 'a') dx = -1;
        else if (key === 'arrowright' || key === 'd') dx = 1;
        else if (key === 'e' || key === 'enter') {
          cancelAutoPath();
          const tile = map[state.playerPos.y][state.playerPos.x];
          if (tile === 'B') {
            dispatch({ type: 'INTERACT_BONFIRE' });
          }
          return;
        }
        else if (key === 'x') {
          cancelAutoPath();
          dispatch({ type: 'EXAMINE_TILE' });
          return;
        }

        if (dx !== 0 || dy !== 0) {
          cancelAutoPath();
          // We drive our own key repeat (faster and steadier than the OS one)
          if (e.repeat) return;
          dispatch({ type: 'MOVE_PLAYER', dx, dy });
          stopHeldMove();
          const timerId = setInterval(() => {
            dispatch({ type: 'MOVE_PLAYER', dx, dy });
          }, HELD_MOVE_MS);
          heldMoveRef.current = { key, timerId };
        }
      }, [dispatch, map, state.playerPos, state.examineText, cancelAutoPath, stopHeldMove]);

      const handleKeyUp = useCallback((e) => {
        if (heldMoveRef.current && heldMoveRef.current.key === e.key.toLowerCase()) {
          stopHeldMove();
        }
      }, [stopHeldMove]);

      useEffect(() => {
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        return () => {
          window.removeEventListener('keydown', handleKeyDown);
          window.removeEventListener('keyup', handleKeyUp);
        };
      }, [handleKeyDown, handleKeyUp]);

      // Held movement must not outlive focus, overlays, or this screen
      useEffect(() => {
        const onBlur = () => stopHeldMove();
        window.addEventListener('blur', onBlur);
        return () => {
          window.removeEventListener('blur', onBlur);
          stopHeldMove();
        };
      }, [stopHeldMove]);

      const currentTile = map[state.playerPos.y][state.playerPos.x];

      // This map's sentinel, if it still stands (renders on its 'N' tile)
      const areaSentinel = SENTINELS[state.currentMap];
      const sentinelAlive = areaSentinel && !(state.sentinelsDefeated || []).includes(areaSentinel.id);

      // Render tile background with area-specific styling. Seed gives each
      // tile a stable texture variant so floors stop looking like wallpaper.
      // Neighbor checks add depth: floors darken under walls (ambient
      // occlusion), walls show a face where floor opens below them, and
      // torch/bonfire light spills onto adjacent floor. All derived from the
      // static map, so memoized tiles never go stale.
      const renderTileBackground = (tile, x, y) => {
        const area = state.currentMap;
        const seed = x * 31 + y * 17;
        // Lore objects render on their tile so the story is discoverable
        const lore = TILE_LORE[area]?.[`${x},${y}`];
        const wallAbove = y > 0 && map[y - 1][x] === 'W';
        const openBelow = y < map.length - 1 && map[y + 1][x] !== 'W';
        const litLeft = x > 0 && (map[y][x - 1] === 'T' || map[y][x - 1] === 'B');
        const litRight = x < map[y].length - 1 && (map[y][x + 1] === 'T' || map[y][x + 1] === 'B');
        const lit = litLeft ? 'left' : litRight ? 'right' : null;
        // Gathering nodes live on plain P tiles (load-time assertion in
        // gamedata.js guarantees no lore collision)
        const gatherNode = GAME_CONFIG.gathering.enabled ? GATHER_POINTS[area]?.[`${x},${y}`] : null;

        switch(tile) {
          case 'W': return <WallTile area={area} seed={seed} openBelow={openBelow} />;
          case 'P': return lore
            ? <LoreObjectTile objectType={lore.object || 'generic'} area={area} />
            : gatherNode
              ? <div className={(state.gatheredPoints || []).includes(`${area}:${x},${y}`) ? undefined : 'gather-available'} style={{width:'100%',height:'100%'}}>
                  <GatherObjectTile kind={gatherNode.kind} depleted={(state.gatheredPoints || []).includes(`${area}:${x},${y}`)} area={area} seed={seed} />
                </div>
              : <PathTile area={area} seed={seed} wallAbove={wallAbove} lit={lit} />;
          case 'G': return <GrassTile area={area} seed={seed} wallAbove={wallAbove} />;
          case 'B': return <BonfireTile area={area} />;
          case 'X': return <GateTile area={area} />;
          case 'E': return <GateTile isKeep={true} area={area} />;
          case 'K': return <BossRoomTile area={area} />;
          case 'T': return <TorchTile area={area} />;
          case 'A': return <AshenGateTile area={area} />;
          case 'H': return <SecretDoorTile revealed={false} area={area} />;
          case 'S': return <SecretDoorTile revealed={state.secretDoorRevealed} area={area} />;
          case 'N': return <PathTile area={area} seed={seed} wallAbove={wallAbove} lit={lit} />;
          case 'C': return <PathTile area={area} seed={seed} wallAbove={wallAbove} lit={lit} />;
          case 'L': return <LoreObjectTile objectType={lore?.object || 'generic'} area={area} />;
          default: return <PathTile area={area} seed={seed} wallAbove={wallAbove} lit={lit} />;
        }
      };

      // Handle tile tap for movement/interaction
      const handleTileTap = (x, y, tile) => {
        // If examine overlay is open, close it
        if (state.examineText) {
          dispatch({ type: 'CLOSE_EXAMINE' });
          return;
        }

        // Block taps while bonfire/deposit/withdraw menus are open
        if (state.bonfireMenuOpen || state.depositMenuOpen || state.withdrawMenuOpen || state.kindleMenuOpen) return;

        const px = state.playerPos.x;
        const py = state.playerPos.y;
        const dx = x - px;
        const dy = y - py;
        const currentTileType = map[py][px];

        // Uncharted tiles cannot be tapped: the map you have not drawn does
        // not exist yet. Adjacent tiles are always charted (reveal radius),
        // so single-step movement is never blocked by this.
        if (fogEnabled && !chart[`${x},${y}`] && !(x === px && y === py)) return;

        // Tap on player tile
        if (x === px && y === py) {
          cancelAutoPath();
          // If on bonfire, interact with it
          if (currentTileType === 'B') {
            dispatch({ type: 'INTERACT_BONFIRE' });
          } else {
            // Check for lore or gathering on this tile
            const key = `${px},${py}`;
            const hasLore = TILE_LORE[state.currentMap]?.[key];
            const hasGather = GAME_CONFIG.gathering.enabled && GATHER_POINTS[state.currentMap]?.[key];
            if (hasLore || hasGather) {
              dispatch({ type: 'EXAMINE_TILE' });
            } else {
              // Open pause menu
              window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape' }));
            }
          }
          return;
        }

        // Check if adjacent tile (including diagonals for tap)
        const isAdjacent = Math.abs(dx) <= 1 && Math.abs(dy) <= 1;

        if (isAdjacent) {
          cancelAutoPath();
          // Move in that direction
          dispatch({ type: 'MOVE_PLAYER', dx, dy });
        } else {
          // Non-adjacent: attempt pathfinding (fog-aware: the walk may only
          // cross tiles the player has charted)
          if (tile === 'W' || (tile === 'S' && !state.secretDoorRevealed)) return;
          const path = findPath(map, px, py, x, y, state.secretDoorRevealed, fogEnabled ? chart : undefined);
          if (path.length > 0) {
            startAutoPath(path);
          }
        }
      };

      return (
        <div>
          <div
            style={{ ...styles.header, cursor: isTouchDevice() ? 'pointer' : 'default' }}
            onClick={() => isTouchDevice() && window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape' }))}
          >
            <span style={styles.souls}>CARRIED {state.souls} | BANKED {state.bankedSouls}</span>
            <span style={{ color: GBC.textDim, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' }}>
              <span style={{ fontSize: 'var(--font-xs)', color: GBC.gold }}>{state.playerName || 'Ashen One'}</span>
              <span>{mapName}</span>
              {fogEnabled && GAME_CONFIG.cartography.showChartPercent && (
                <span style={{ fontSize: 'var(--font-xs)' }}>CHART {getChartPercent(state.visitedTiles, state.currentMap, map)}%</span>
              )}
            </span>
            <span style={{ color: GBC.textDim, fontSize: 'var(--font-sm)' }}>TEAM {state.team.length}/{GAME_CONFIG.souls.maxTeamSize}</span>
          </div>

          <div style={{ ...styles.mapContainer, position: 'relative' }}>
            <div style={{
              ...styles.grid,
              position: 'relative',
              gridTemplateColumns: `repeat(${map[0].length}, var(--tile-size))`,
              boxShadow: `${styles.grid.boxShadow}, 0 0 24px ${(AREA_PALETTES[state.currentMap] || AREA_PALETTES.ashenPath).glow}, 0 6px 16px rgba(0, 0, 0, 0.6)`,
              filter: (AREA_PALETTES[state.currentMap] || AREA_PALETTES.ashenPath).areaFilter || 'none'
            }}>
              {map.map((row, y) =>
                row.map((tile, x) => {
                  const isPlayer = x === state.playerPos.x && y === state.playerPos.y;
                  const hasSouls = state.droppedSouls &&
                    state.droppedSouls.map === state.currentMap &&
                    state.droppedSouls.pos.x === x &&
                    state.droppedSouls.pos.y === y;

                  // Check if adjacent to player for tap highlighting
                  const px = state.playerPos.x;
                  const py = state.playerPos.y;
                  const isAdjacent = Math.abs(x - px) <= 1 && Math.abs(y - py) <= 1 && !(x === px && y === py);
                  const isWalkable = tile !== 'W';
                  const isDestFlash = destFlash && x === destFlash.x && y === destFlash.y;

                  // Cartography layers. Fog (zIndex 20) sits above every
                  // sprite layer so nothing hidden can leak through it.
                  const tileKey = `${x},${y}`;
                  const visited = !fogEnabled || !!chart[tileKey];
                  const justRevealed = fogEnabled && visited && !prevChart[tileKey];
                  const isNearPlayer = Math.abs(x - px) <= GAME_CONFIG.cartography.revealRadius &&
                                       Math.abs(y - py) <= GAME_CONFIG.cartography.revealRadius;
                  const fogColor = (AREA_PALETTES[state.currentMap] || AREA_PALETTES.ashenPath).deep;

                  return (
                    <div
                      key={`${x}-${y}`}
                      style={{
                        ...styles.tile,
                        cursor: (isWalkable || isPlayer) && visited ? 'pointer' : 'default'
                      }}
                      onClick={() => handleTileTap(x, y, tile)}
                    >
                      {renderTileBackground(tile, x, y)}
                      {!visited && (
                        <div style={{ position: 'absolute', inset: 0, zIndex: 20, backgroundColor: fogColor, pointerEvents: 'none' }}/>
                      )}
                      {justRevealed && (
                        <div className="fog-lift" style={{ position: 'absolute', inset: 0, zIndex: 20, backgroundColor: fogColor }}/>
                      )}
                      {visited && fogEnabled && !isNearPlayer && GAME_CONFIG.cartography.dimExplored && (
                        <div style={{ position: 'absolute', inset: 0, zIndex: 20, backgroundColor: `rgba(4, 6, 8, ${GAME_CONFIG.cartography.exploredDimOpacity})`, pointerEvents: 'none' }}/>
                      )}
                      {isDestFlash && (
                        <div style={{ position: 'absolute', inset: 0, zIndex: 15, animation: 'destinationFlash 0.6s ease-out forwards', pointerEvents: 'none' }} />
                      )}
                      {isPlayer && (
                        <div style={{ position: 'absolute', zIndex: 10 }}>
                          <PlayerSprite direction={state.playerDir} appearance={state.playerAppearance || 'other'} isMoving={isMoving} />
                        </div>
                      )}
                      {hasSouls && !isPlayer && (
                        <div style={{
                          position: 'absolute',
                          zIndex: 5,
                          display: 'flex',
                          flexDirection: 'column',
                          alignItems: 'center',
                          justifyContent: 'center'
                        }}>
                          <div style={{
                            width: '28px',
                            height: '28px',
                            backgroundColor: GBC.gold,
                            border: '3px solid #744210',
                            animation: 'flicker 1s infinite',
                            boxShadow: '0 0 10px rgba(246, 224, 94, 0.5)'
                          }} />
                          <div style={{
                            fontSize: '8px',
                            color: GBC.gold,
                            fontFamily: '"IBM Plex Mono", monospace',
                            marginTop: '2px',
                            textShadow: '1px 1px 0 #000'
                          }}>SOULS</div>
                        </div>
                      )}
                      {ghost && ghost.map === state.currentMap &&
                        ghost.pos.x === x && ghost.pos.y === y &&
                        ghost.name && ghost.name !== state.playerName && !isPlayer && (
                        <div style={{
                          position: 'absolute',
                          zIndex: 4,
                          display: 'flex',
                          flexDirection: 'column',
                          alignItems: 'center',
                          justifyContent: 'center',
                          opacity: 0.5
                        }}>
                          <div style={{ transform: 'scale(0.6)', transformOrigin: 'center', filter: 'grayscale(100%)' }}>
                            <FallbackPlayerSprite direction="down" appearance={ghost.appearance || 'other'} />
                          </div>
                          <div style={{
                            fontSize: '6px',
                            color: GBC.textDim,
                            fontFamily: '"IBM Plex Mono", monospace',
                            textShadow: '1px 1px 0 #000',
                            marginTop: '-4px'
                          }}>{ghost.name}...</div>
                        </div>
                      )}
                      {liveFoes.map(f => f.pos.x === x && f.pos.y === y && !isPlayer ? (
                        <div key={f.foe.id} style={{
                          position: 'absolute',
                          zIndex: 6,
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center'
                        }}>
                          <div className={f.pos.mode === 'chase' ? 'foe-aura-chase' : 'foe-aura-patrol'} style={{ transform: 'scale(0.8)', transformOrigin: 'center' }}>
                            <CreatureSprite
                              type={f.foe.type}
                              size={40}
                              isEnemy={true}
                              scars={f.foe.scars}
                              scarCount={f.foe.scars.length}
                              animated={true}
                            />
                          </div>
                        </div>
                      ) : null)}
                      {sentinelAlive && tile === 'N' && !isPlayer && (
                        <div style={{
                          position: 'absolute',
                          zIndex: 6,
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'center'
                        }}>
                          <div style={{ transform: 'scale(0.8)', transformOrigin: 'center' }}>
                            <CreatureSprite
                              type={areaSentinel.type}
                              size={40}
                              isEnemy={true}
                              scars={areaSentinel.scars}
                              scarCount={areaSentinel.scars.length}
                              animated={true}
                            />
                          </div>
                        </div>
                      )}
                      {tile === 'C' && !isPlayer && (
                        <div style={{
                          position: 'absolute',
                          zIndex: 6,
                          display: 'flex',
                          flexDirection: 'column',
                          alignItems: 'center',
                          justifyContent: 'center'
                        }}>
                          <svg width="32" height="36" viewBox="0 0 32 36" style={{ animation: 'idleBob 2.8s ease-in-out infinite' }}>
                            <defs>
                              <linearGradient id="keeper-robe-grad" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#5a5450"/>
                                <stop offset="100%" stopColor="#2a2420"/>
                              </linearGradient>
                              <radialGradient id="keeper-staff-glow" cx="0.5" cy="0.5" r="0.5">
                                <stop offset="0%" stopColor="#faf089"/>
                                <stop offset="60%" stopColor="#f6e05e"/>
                                <stop offset="100%" stopColor="#d69e2e" stopOpacity="0"/>
                              </radialGradient>
                              <radialGradient id="keeper-face-shadow" cx="0.5" cy="0.3" r="0.6">
                                <stop offset="0%" stopColor="#1a1614"/>
                                <stop offset="100%" stopColor="#0d0b0a"/>
                              </radialGradient>
                            </defs>
                            {/* Staff shaft */}
                            <path d="M27 10 L27 34 L29 34 L29 10 Z" fill="#5a4a3a"/>
                            <path d="M27.5 10 L27.5 34" stroke="#6b5a4a" strokeWidth="0.5" opacity="0.5"/>
                            {/* Staff orb glow aura */}
                            <circle cx="28" cy="6" r="7" fill="url(#keeper-staff-glow)" opacity="0.4"/>
                            {/* Staff orb */}
                            <circle cx="28" cy="6" r="3.5" fill="#f6e05e"/>
                            <circle cx="28" cy="6" r="2" fill="#faf089"/>
                            <circle cx="27" cy="5" r="0.8" fill="#fffde7" opacity="0.8"/>
                            {/* Hood outer shape */}
                            <path d="M8 14 Q8 3 16 2 Q24 3 24 14 Z" fill="url(#keeper-robe-grad)"/>
                            {/* Hood brim */}
                            <path d="M6 14 Q6 12 8 12 L24 12 Q26 12 26 14 Z" fill="#4a4440"/>
                            {/* Shadowed face */}
                            <ellipse cx="16" cy="12" rx="6" ry="4" fill="url(#keeper-face-shadow)"/>
                            {/* Ember eyes */}
                            <circle cx="13" cy="11.5" r="1.2" fill="#f6ad55"/>
                            <circle cx="19" cy="11.5" r="1.2" fill="#f6ad55"/>
                            <circle cx="13" cy="11.2" r="0.5" fill="#fef3c7"/>
                            <circle cx="19" cy="11.2" r="0.5" fill="#fef3c7"/>
                            {/* Robe body */}
                            <path d="M6 14 L4 34 L28 34 L26 14 Z" fill="url(#keeper-robe-grad)"/>
                            {/* Robe drape folds */}
                            <path d="M10 16 Q12 22 10 30" stroke="#3a3430" strokeWidth="1" fill="none" opacity="0.6"/>
                            <path d="M16 14 Q18 24 16 34" stroke="#3a3430" strokeWidth="1" fill="none" opacity="0.5"/>
                            <path d="M22 16 Q20 22 22 30" stroke="#3a3430" strokeWidth="1" fill="none" opacity="0.6"/>
                            {/* Robe hem */}
                            <path d="M4 32 Q8 30 16 32 Q24 30 28 32 L28 34 L4 34 Z" fill="#2a2420"/>
                            {/* Left hand holding staff */}
                            <ellipse cx="26" cy="20" rx="2" ry="1.5" fill="#3a3430"/>
                          </svg>
                          <div style={{
                            fontSize: '6px',
                            color: GBC.gold,
                            fontFamily: '"IBM Plex Mono", monospace',
                            textShadow: '1px 1px 0 #000',
                            marginTop: '-2px'
                          }}>KEEPER</div>
                        </div>
                      )}
                      {dustPuffs.some(pf => pf.x === x && pf.y === y) && (
                        <div style={{
                          position: 'absolute',
                          zIndex: 8,
                          width: '10px',
                          height: '6px',
                          borderRadius: '50%',
                          backgroundColor: (AREA_PALETTES[state.currentMap] || AREA_PALETTES.ashenPath).dustColor || 'rgba(200, 190, 170, 0.5)',
                          animation: 'dustPuff 0.5s ease-out forwards',
                          pointerEvents: 'none'
                        }} />
                      )}
                    </div>
                  );
                })
              )}
              <AshFall map={state.currentMap} />
              <LightingOverlay map={state.currentMap} mapData={map} />
              <MapVignette map={state.currentMap} />
              <MapFrameCorners map={state.currentMap} />
            </div>
          </div>

          {currentTile === 'B' && !state.bonfireMenuOpen && (
            <div style={{
              textAlign: 'center',
              color: GBC.gold,
              marginBottom: 'var(--spacing-sm)',
              padding: 'var(--spacing-xs)',
              backgroundColor: GBC.bgPanel,
              border: `2px solid ${GBC.border}`,
              fontSize: 'var(--font-sm)'
            }}>
              {isTouchDevice() ? 'Tap here to rest' : 'Press E to rest at bonfire'}
            </div>
          )}

          {GAME_CONFIG.gathering.enabled &&
            GATHER_POINTS[state.currentMap]?.[`${state.playerPos.x},${state.playerPos.y}`] &&
            !(state.gatheredPoints || []).includes(`${state.currentMap}:${state.playerPos.x},${state.playerPos.y}`) && (
            <div style={{
              textAlign: 'center',
              color: GBC.gold,
              marginBottom: 'var(--spacing-sm)',
              padding: 'var(--spacing-xs)',
              backgroundColor: GBC.bgPanel,
              border: `2px solid ${GBC.border}`,
              fontSize: 'var(--font-sm)'
            }}>
              {isTouchDevice() ? 'Tap here to gather' : 'Press X to gather'}
            </div>
          )}

          {state.bonfireMenuOpen && (
            <div style={styles.bonfireMenu}>
              <div style={{ color: GBC.gold, marginBottom: 'var(--spacing-sm)', fontSize: 'var(--font-sm)' }}>BONFIRE</div>

              {!state.depositMenuOpen && !state.withdrawMenuOpen && !state.kindleMenuOpen && !state.titlesMenuOpen && (
                <React.Fragment>
                  <div
                    style={styles.bonfireOption}
                    onClick={() => { playSfx('bonfireRest'); dispatch({ type: 'REST_AT_BONFIRE' }); }}
                    onMouseOver={e => e.currentTarget.style.borderColor = GBC.gold}
                    onMouseOut={e => e.currentTarget.style.borderColor = GBC.border}
                  >
                    REST - Heal all, respawn enemies
                  </div>

                  <div
                    style={styles.bonfireOption}
                    onClick={() => dispatch({ type: 'TOGGLE_KINDLE_MENU' })}
                    onMouseOver={e => e.currentTarget.style.borderColor = GBC.gold}
                    onMouseOut={e => e.currentTarget.style.borderColor = GBC.border}
                  >
                    KINDLE - Spend souls to strengthen
                  </div>

                  <div
                    style={styles.bonfireOption}
                    onClick={() => dispatch({ type: 'TOGGLE_DEPOSIT_MENU' })}
                    onMouseOver={e => e.currentTarget.style.borderColor = GBC.gold}
                    onMouseOut={e => e.currentTarget.style.borderColor = GBC.border}
                  >
                    DEPOSIT - Carried → Banked
                  </div>

                  <div
                    style={styles.bonfireOption}
                    onClick={() => dispatch({ type: 'TOGGLE_WITHDRAW_MENU' })}
                    onMouseOver={e => e.currentTarget.style.borderColor = GBC.gold}
                    onMouseOut={e => e.currentTarget.style.borderColor = GBC.border}
                  >
                    WITHDRAW - Banked → Carried
                  </div>

                  {state.titles.length > 0 && (
                    <div
                      style={styles.bonfireOption}
                      onClick={() => dispatch({ type: 'TOGGLE_TITLES_MENU' })}
                      onMouseOver={e => e.currentTarget.style.borderColor = GBC.gold}
                      onMouseOut={e => e.currentTarget.style.borderColor = GBC.border}
                    >
                      TITLES - Choose what you are called
                    </div>
                  )}

                  {state.team.length > 1 && (
                    <div style={{ marginTop: 'var(--spacing-sm)' }}>
                      <div style={{ color: GBC.textDim, marginBottom: 'var(--spacing-xs)', fontSize: 'var(--font-xs)' }}>SWITCH ACTIVE:</div>
                      {state.team.map((creature, i) => {
                        const isActive = i === state.activeCreatureIndex;
                        const baseData = STARTERS[creature.id];
                        const { maxHp } = applyScars(creature, baseData);
                        const isAlive = creature.hp > 0;

                        return (
                          <div
                            key={i}
                            style={{
                              ...styles.bonfireOption,
                              opacity: isAlive ? 1 : 0.5,
                              cursor: isAlive && !isActive ? 'pointer' : 'default',
                              borderColor: isActive ? getTypeColor(creature.type) : GBC.border
                            }}
                            onClick={() => {
                              if (isAlive && !isActive) {
                                dispatch({ type: 'SWITCH_ACTIVE_AT_BONFIRE', index: i });
                              }
                            }}
                          >
                            <span style={{ color: getTypeColor(creature.type) }}>{getTypeIcon(creature.type)}</span>
                            {' '}{creature.nickname || creature.name} - {creature.hp}/{maxHp} HP
                            {isActive && <span style={{ color: GBC.gold, marginLeft: '6px' }}>(ACTIVE)</span>}
                            {!isAlive && <span style={{ color: GBC.red, marginLeft: '6px' }}>(FAINTED)</span>}
                            {creature.scars?.length > 0 && (
                              <span style={{ color: GBC.red, marginLeft: '6px' }}>({creature.scars.length} scars)</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  <div
                    style={{ ...styles.bonfireOption, marginTop: '8px', color: GBC.textDim }}
                    onClick={() => dispatch({ type: 'CLOSE_BONFIRE_MENU' })}
                  >
                    LEAVE
                  </div>

        hollowDeep: 'M0,30 Q12,18 18,28 Q30,8 42,26 Q52,14 64,28 Q76,12 88,26 Q100,16 112,28 L120,22 L120,40 L0,40 Z',
        labyrinth:  'M0,24 Q8,20 16,24 L16,12 Q24,8 32,12 L32,26 Q40,22 48,26 L48,10 Q56,6 64,10 L64,24 Q72,20 80,24 L80,14 Q88,10 96,14 L96,26 L120,26 L120,40 L0,40 Z'
      };
      const NEAR_RIDGES = {
