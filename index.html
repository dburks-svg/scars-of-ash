  <script type="text/babel">
    const { useState, useReducer, useEffect, useCallback, useRef } = React;

    // ============= SPRITE REACT COMPONENTS =============
    // AnimatedSprite component - cycles through animation frames
    // Frame rate guide: idle=250ms (4fps), walk=166ms (6fps), battle=125ms (8fps)
    const AnimatedSprite = ({
      frames,           // Array of preloaded Image objects
      frameRate = 250,  // ms per frame - default to idle speed (4fps)
      size = 48,
      flip = false,
      filter = 'none',
      playing = true
    }) => {
      const [frameIndex, setFrameIndex] = React.useState(0);

      React.useEffect(() => {
        if (!playing || !frames || frames.length <= 1) return;
        const interval = setInterval(() => {
          setFrameIndex(i => (i + 1) % frames.length);
        }, frameRate);
        return () => clearInterval(interval);
      }, [frames, frameRate, playing]);

      if (!frames || frames.length === 0) {
        return null;
      }

      const currentFrame = frames[frameIndex % frames.length];

      return (
        <img
          src={currentFrame.src}
          alt="sprite"
          width={size}
          height={size}
          style={{
            imageRendering: 'pixelated',
            transform: flip ? 'scaleX(-1)' : 'none',
            filter: filter
          }}
        />
      );
    };

    // Player sprite facing different directions (16x16 scaled up) - SVG fallback version
    // Each appearance has a distinct silhouette
    const FallbackPlayerSprite = ({ direction = 'down', appearance = 'other' }) => {
      const px = 3; // pixel size (3 = 48px total)

            {/* Pants */}

            <path d="M29 36 Q28 38 28 42 L34 42 Q34 38 33 36 Z" fill={pants}/>
            {/* Feet */}
            <ellipse cx="17" cy="44" rx="4" ry="2" fill={outline}/>

          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            {/* Short hair back */}
            <path d="M16 6 Q18 3 24 2 Q30 3 32 6 Q34 8 32 12 L16 12 Q14 8 16 6 Z" fill={hair}/>
            {/* Neck */}

      // FEMALE: Long hair with ponytail, red/maroon cloak, slender frame
      const femaleSprites = {
        down: (
          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            <defs>
              <linearGradient id="player-female-cloak-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={cloakLight}/>
                <stop offset="100%" stopColor={cloak}/>

            </defs>
            {/* Long hair with side strands */}
            <path d="M16 4 Q18 2 24 2 Q30 2 32 4 Q34 8 32 14 L16 14 Q14 8 16 4 Z" fill={hair}/>
            {/* Side strands */}
            <path d="M14 8 Q12 10 12 16 Q12 20 14 22" stroke={hair} strokeWidth="3" fill="none" strokeLinecap="round"/>
            <path d="M34 8 Q36 10 36 16 Q36 20 34 22" stroke={hair} strokeWidth="3" fill="none" strokeLinecap="round"/>
            {/* Face */}
            <ellipse cx="24" cy="14" rx="7" ry="7" fill={skin}/>
            {/* Eyes */}
            <circle cx="21" cy="14" r="1.2" fill={outline}/>

            {/* Slender cloak */}
            <path d="M14 22 L34 22 Q36 22 36 24 L34 36 L14 36 Q12 36 12 34 L14 22 Z" fill="url(#player-female-cloak-grad)"/>
            {/* Cloak clasp */}
            <circle cx="24" cy="26" r="2" fill={cloakLight}/>
            {/* Pants */}
            <path d="M16 36 Q15 38 15 42 L21 42 Q21 38 20 36 Z" fill={pants}/>
            <path d="M28 36 Q27 38 27 42 L33 42 Q33 38 32 36 Z" fill={pants}/>
            {/* Feet */}
            <ellipse cx="18" cy="44" rx="3.5" ry="2" fill={outline}/>
            <ellipse cx="30" cy="44" rx="3.5" ry="2" fill={outline}/>
          </svg>
        ),
        up: (
          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            {/* Long hair with ponytail */}
            <path d="M16 4 Q18 2 24 2 Q30 2 32 4 Q34 8 32 14 L16 14 Q14 8 16 4 Z" fill={hair}/>
            {/* Side strands back view */}
            <path d="M14 8 Q12 10 12 14 Q12 18 14 20" stroke={hair} strokeWidth="3" fill="none" strokeLinecap="round"/>
            <path d="M34 8 Q36 10 36 14 Q36 18 34 20" stroke={hair} strokeWidth="3" fill="none" strokeLinecap="round"/>
            {/* Ponytail down back */}
            <path d="M22 10 Q22 18 21 26 Q20 32 22 34" stroke={hair} strokeWidth="4" fill="none" strokeLinecap="round"/>
            <path d="M26 10 Q26 18 27 26 Q28 32 26 34" stroke={hair} strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.5"/>
            {/* Slender cloak */}
            <path d="M12 22 L36 22 Q38 22 38 24 L36 36 L12 36 Q10 36 10 34 L12 22 Z" fill={cloak}/>
            {/* Cloak back folds */}
            <path d="M20 24 L20 34" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.3"/>
            <path d="M28 24 L28 34" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.3"/>
            {/* Pants */}
            <path d="M16 36 Q15 38 15 42 L21 42 Q21 38 20 36 Z" fill={pants}/>
            <path d="M28 36 Q27 38 27 42 L33 42 Q33 38 32 36 Z" fill={pants}/>
            {/* Feet */}

        ),
        left: (
          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            {/* Long hair */}

            {/* Slender cloak */}
            <path d="M14 22 L32 22 Q34 22 34 24 L32 36 L14 36 Q12 36 12 34 L14 22 Z" fill={cloak}/>
            <path d="M20 26 Q22 24 24 26" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.4"/>

            <path d="M26 36 Q25 38 25 42 L31 42 Q31 38 30 36 Z" fill={pants}/>

            {/* Hair strand front */}

            {/* Ponytail behind */}
            <path d="M20 6 Q16 8 14 12 Q12 18 14 24 Q16 28 14 32" stroke={hair} strokeWidth="3.5" fill="none" strokeLinecap="round"/>
            {/* Face */}
            <ellipse cx="26" cy="14" rx="6" ry="6" fill={skin}/>
            {/* Eye */}
            <circle cx="29" cy="14" r="1.2" fill={outline}/>
            {/* Slender cloak */}
            <path d="M16 22 L34 22 Q36 22 36 24 L34 36 L16 36 Q14 36 14 34 L16 22 Z" fill={cloak}/>
            <path d="M26 26 Q28 24 30 26" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.4"/>
            {/* Pants */}
            <path d="M17 36 Q16 38 16 42 L22 42 Q22 38 21 36 Z" fill={pants}/>
            <path d="M27 36 Q26 38 26 42 L32 42 Q32 38 31 36 Z" fill={pants}/>
            {/* Feet */}
            <ellipse cx="19" cy="44" rx="3.5" ry="2" fill={outline}/>
            <ellipse cx="29" cy="44" rx="3.5" ry="2" fill={outline}/>
          </svg>
        )
      };

      // OTHER: Hooded figure, purple/gray cloak, face obscured
      const otherSprites = {
        down: (
          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            <defs>
              <linearGradient id="player-other-cloak-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={cloakLight}/>
                <stop offset="100%" stopColor={cloak}/>
              </linearGradient>
            </defs>
            {/* Hood */}
            <path d="M12 6 Q12 0 24 0 Q36 0 36 6 L38 16 Q38 18 36 18 L12 18 Q10 18 10 16 Z" fill={cloak}/>
            {/* Hood brim shadow */}
            <path d="M14 14 Q24 12 34 14" stroke={outline} strokeWidth="0.6" fill="none" opacity="0.3"/>
            {/* Shadowed face */}
            <ellipse cx="24" cy="18" rx="6" ry="5" fill={skin}/>
            {/* Glowing eyes in shadow */}
            <circle cx="20" cy="18" r="1.3" fill={cloakLight}/>
            <circle cx="28" cy="18" r="1.3" fill={cloakLight}/>
            <circle cx="20" cy="17.5" r="0.5" fill="#fff" opacity="0.4"/>
            <circle cx="28" cy="17.5" r="0.5" fill="#fff" opacity="0.4"/>
            {/* Cloak body */}
            <path d="M10 18 Q8 18 8 20 L6 36 Q6 38 8 38 L40 38 Q42 38 42 36 L40 20 Q40 18 38 18 Z" fill="url(#player-other-cloak-grad)"/>
            {/* Cloak drape folds */}
            <path d="M18 22 Q20 28 18 36" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.3"/>
            <path d="M30 22 Q28 28 30 36" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.3"/>
            {/* Cloak front detail */}
            <path d="M22 24 L22 36" stroke={cloakLight} strokeWidth="0.5" fill="none" opacity="0.2"/>
            <path d="M26 24 L26 36" stroke={cloakLight} strokeWidth="0.5" fill="none" opacity="0.2"/>
            {/* Legs peek out */}
            <path d="M16 36 Q15 38 15 42 L20 42 Q20 38 19 36 Z" fill={pants}/>
            <path d="M29 36 Q28 38 28 42 L33 42 Q33 38 32 36 Z" fill={pants}/>
            {/* Feet */}
            <ellipse cx="17" cy="44" rx="3.5" ry="2" fill={outline}/>
            <ellipse cx="31" cy="44" rx="3.5" ry="2" fill={outline}/>
          </svg>
        ),
        up: (
          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            {/* Hood back (full coverage) */}
            <path d="M12 6 Q12 0 24 0 Q36 0 36 6 L38 16 Q38 18 36 18 L12 18 Q10 18 10 16 Z" fill={cloak}/>
            {/* Hood interior visible */}
            <path d="M16 6 Q24 2 32 6 L34 14 L14 14 Z" fill={hair} opacity="0.6"/>
            {/* Cloak body */}
            <path d="M8 18 Q6 18 6 20 L4 38 Q4 40 6 40 L42 40 Q44 40 44 38 L42 20 Q42 18 40 18 Z" fill={cloak}/>
            {/* Cloak back folds */}
            <path d="M18 22 Q20 28 18 36" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.3"/>
            <path d="M24 20 Q26 28 24 38" stroke={cloakLight} strokeWidth="0.5" fill="none" opacity="0.25"/>
            <path d="M30 22 Q28 28 30 36" stroke={cloakLight} strokeWidth="0.6" fill="none" opacity="0.3"/>
            {/* Legs peek out */}
            <path d="M16 38 Q15 40 15 44 L20 44 Q20 40 19 38 Z" fill={pants}/>
            <path d="M29 38 Q28 40 28 44 L33 44 Q33 40 32 38 Z" fill={pants}/>
            {/* Feet */}
            <ellipse cx="17" cy="46" rx="3.5" ry="2" fill={outline}/>
            <ellipse cx="31" cy="46" rx="3.5" ry="2" fill={outline}/>
          </svg>
        ),
        left: (
          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            {/* Hood side */}
            <path d="M14 6 Q16 0 26 2 Q34 4 34 8 L36 16 Q36 18 34 18 L12 18 Q10 16 12 12 Z" fill={cloak}/>
            {/* Shadowed face peek */}
            <ellipse cx="20" cy="16" rx="5" ry="5" fill={skin}/>
            {/* Glowing eye */}
            <circle cx="17" cy="16" r="1.3" fill={cloakLight}/>
            <circle cx="17" cy="15.5" r="0.5" fill="#fff" opacity="0.4"/>
            {/* Cloak body */}
            <path d="M12 18 Q10 18 10 20 L8 36 Q8 38 10 38 L36 38 Q38 38 38 36 L36 20 Q36 18 34 18 Z" fill={cloak}/>
            <path d="M20 24 Q22 28 20 34" stroke={cloakLight} strokeWidth="0.5" fill="none" opacity="0.3"/>
            {/* Legs */}
            <path d="M16 36 Q15 38 15 42 L20 42 Q20 38 19 36 Z" fill={pants}/>

            {/* Feet */}

            <ellipse cx="28" cy="44" rx="3.5" ry="2" fill={outline}/>

        ),

          <svg width={16*px} height={16*px} viewBox="0 0 48 48">
            {/* Hood side */}
            <path d="M34 6 Q32 0 22 2 Q14 4 14 8 L12 16 Q12 18 14 18 L36 18 Q38 16 36 12 Z" fill={cloak}/>
            {/* Shadowed face peek */}
            <ellipse cx="28" cy="16" rx="5" ry="5" fill={skin}/>

            <circle cx="31" cy="15.5" r="0.5" fill="#fff" opacity="0.4"/>

            <path d="M12 18 Q10 18 10 20 L8 36 Q8 38 10 38 L36 38 Q38 38 38 36 L36 20 Q36 18 34 18 Z" fill={cloak}/>

      // Select sprite set based on appearance
      const spriteSet = appearance === 'male' ? maleSprites :
                        appearance === 'female' ? femaleSprites :
                        otherSprites;

      return spriteSet[direction] || spriteSet.down;
    };

    // Main player sprite component
    // GIF sprites for male (browser-animated), SVG fallback for others.
    // 400ms delay before transitioning from walk GIF to idle GIF.
    const PlayerSprite = ({ direction = 'down', appearance = 'other', isMoving = false }) => {
      const [showWalk, setShowWalk] = React.useState(false);
      const [bobUp, setBobUp] = React.useState(false);
      const walkTimeoutRef = React.useRef(null);

      // Handle walk-to-idle transition with 400ms delay
      React.useEffect(() => {
        if (isMoving) {
          if (walkTimeoutRef.current) {
            clearTimeout(walkTimeoutRef.current);
            walkTimeoutRef.current = null;
          }
          setShowWalk(true);
        } else if (showWalk) {
          walkTimeoutRef.current = setTimeout(() => {
            setShowWalk(false);
            walkTimeoutRef.current = null;
          }, 400);
        }
        return () => {
          if (walkTimeoutRef.current) {
            clearTimeout(walkTimeoutRef.current);
          }
        };
      }, [isMoving]);

      // Bob animation for SVG fallback movement
      React.useEffect(() => {
        if (!isMoving) {
          setBobUp(false);
          return;
        }
        const interval = setInterval(() => {
          setBobUp(prev => !prev);
        }, 200);
        return () => clearInterval(interval);
      }, [isMoving]);

      // Check for preloaded GIF sprite (single Image, not array)
      const animType = showWalk ? 'walk' : 'idle';
      const sprite = preloadedSprites.player[appearance]?.[direction]?.[animType];

      if (sprite && !Array.isArray(sprite)) {
        return (
          <div style={{ width: 48, height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <img src={sprite.src} width={48} height={48} style={{ imageRendering: 'pixelated' }} />
          </div>
        );
      }

      // Fallback: SVG bobs while walking, breathes gently while idle
      return (
        <div style={{
          transform: isMoving && bobUp ? 'translateY(-2px)' : 'none',
          animation: isMoving ? 'none' : 'idleBob 2.4s ease-in-out infinite'
        }}>
          <FallbackPlayerSprite direction={direction} appearance={appearance} />
        </div>
      );
    };

    // Creature sprites - SVG fallback version
    const FallbackCreatureSprite = ({ type, size = 48, isEnemy = false }) => {
      const px = size / 16;

      const sprites = {
        fire: ( // Cindrath - flame creature with teardrop body and flame tendrils
          <svg width={size} height={size} viewBox="0 0 48 48">
            <defs>
              <radialGradient id="fire-body-grad" cx="0.5" cy="0.6" r="0.5">
                <stop offset="0%" stopColor="#ed8936"/>
                <stop offset="60%" stopColor="#c53030"/>
                <stop offset="100%" stopColor="#8b1a1a"/>
              </radialGradient>
              <linearGradient id="fire-flame-grad" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stopColor="#ed8936"/>
                <stop offset="50%" stopColor="#f6ad55"/>
                <stop offset="100%" stopColor="#f6e05e"/>
              </linearGradient>
              <radialGradient id="fire-ember-grad" cx="0.4" cy="0.4" r="0.5">

        ),
        light: ( // Solrath - radiant sun-like creature
          <svg width={size} height={size} viewBox="0 0 48 48">
            <defs>

            {/* Main body */}

            {/* Surface texture arcs */}

        ),
        hollowWarden: ( // Hollow Warden - tall imposing humanoid with corruption

            {/* Tall imposing body */}
            <path d="M14 18 L10 20 L8 34 L12 40 L36 40 L40 34 L38 20 L34 18 Z" fill="url(#warden-body-grad)"/>

            <path d="M34 22 Q32 28 34 34" stroke="#553c9a" strokeWidth="1" fill="none" opacity="0.5"/>
            {/* Crack branch details */}
            <path d="M14 26 L12 28" stroke="#b794f4" strokeWidth="0.6" fill="none" opacity="0.5"/>
            <path d="M28 24 L30 26" stroke="#9f7aea" strokeWidth="0.6" fill="none" opacity="0.4"/>
            <path d="M20 28 L18 30" stroke="#805ad5" strokeWidth="0.5" fill="none" opacity="0.4"/>
            {/* Crack glow spots */}

            {/* Long left arm */}
            <path d="M10 20 Q4 22 2 28 Q0 32 1 36 Q2 38 3 36 Q2 32 4 28 Q6 24 8 22" fill="#2d2040"/>
            <path d="M1 36 Q0 38 1 40 L3 40 Q4 38 3 36" fill="#1a1030"/>
            {/* Long right arm */}
            <path d="M38 20 Q44 22 46 28 Q48 32 47 36 Q46 38 45 36 Q46 32 44 28 Q42 24 40 22" fill="#2d2040"/>
            <path d="M47 36 Q48 38 47 40 L45 40 Q44 38 45 36" fill="#1a1030"/>
            {/* Arm crack details */}
            <path d="M4 28 Q3 30 4 32" stroke="#805ad5" strokeWidth="0.6" fill="none" opacity="0.4"/>
            <path d="M44 28 Q45 30 44 32" stroke="#805ad5" strokeWidth="0.6" fill="none" opacity="0.4"/>
            {/* Legs */}
            <path d="M14 38 Q12 42 12 46 L16 46 Q16 42 16 40" fill="#0a0510"/>
            <path d="M32 38 Q32 42 32 46 L36 46 Q36 42 34 40" fill="#0a0510"/>
            {/* Void particles */}
            <circle cx="6" cy="16" r="0.8" fill="#9f7aea" opacity="0.2"/>

      return sprites[type] || sprites.fire;
    };

    // Main creature sprite component - uses PNG if available, falls back to SVG
    // Now supports 4-frame idle animations
    // Scars you can SEE. Each scar paints its own mark on the sprite, so a
    // roster screen reads as a history of how each creature died.
    const SCAR_DECALS = {
      fractured:   [{ d: 'M30 16 L36 26 L31 30 L38 44', stroke: '#e2e8f0', w: 2 }],
      cracked:     [{ d: 'M16 22 L24 30 L18 36 L26 46', stroke: '#a0aec0', w: 2 }],
      burned:      [{ blob: [30, 34, 9], fill: '#7b341e' }, { blob: [36, 28, 5], fill: '#c05621' }],
      frostbitten: [{ d: 'M14 30 L22 30 M18 26 L18 34 M15 27 L21 33 M21 27 L15 33', stroke: '#90cdf4', w: 2 }],
      cursed:      [{ blob: [24, 20, 7], fill: '#553c9a', op: 0.75 }, { blob: [30, 14, 4], fill: '#805ad5', op: 0.6 }],
      blinded:     [{ d: 'M18 20 L30 28 M30 20 L18 28', stroke: '#faf089', w: 2 }],
      withered:    [{ d: 'M20 40 L24 32 M28 42 L30 34 M36 40 L38 33', stroke: '#68705a', w: 2 }],
      haunted:     [{ blob: [20, 16, 4], fill: '#e2e8f0', op: 0.5 }, { blob: [34, 12, 3], fill: '#e2e8f0', op: 0.35 }],
      hesitant:    [{ d: 'M40 34 L46 34 M43 31 L43 37', stroke: '#f6ad55', w: 2 }],
      flinching:   [{ d: 'M10 18 L18 18 M8 24 L14 24 M10 30 L16 30', stroke: '#cbd5e0', w: 1 }]
    };

    const ScarOverlay = ({ scars, size, isEnemy }) => {
      if (!scars || scars.length === 0) return null;
      // Dedupe: Fractured stacks, but one crack reads the same as five.
      const ids = [...new Set(scars.map(s => s.id))].filter(id => SCAR_DECALS[id]);
      if (ids.length === 0) return null;

      return (
        <svg
          width={size}
          height={size}
          viewBox="0 0 56 56"
          style={{
            position: 'absolute',
            top: 0,
            left: 0,
            pointerEvents: 'none',
            transform: isEnemy ? 'scaleX(-1)' : 'none',
          }}
        >
          {ids.flatMap(id => SCAR_DECALS[id].map((mark, i) => (
            mark.blob ? (
              <circle
                key={`${id}-${i}`}
                cx={mark.blob[0]} cy={mark.blob[1]} r={mark.blob[2]}
                fill={mark.fill} opacity={mark.op ?? 0.85}
              />
            ) : (
              <path
                key={`${id}-${i}`}
                d={mark.d}
                stroke={mark.stroke}
                strokeWidth={mark.w}
                fill="none"
                opacity="0.9"
                strokeLinecap="round"
              />
            )
          )))}
        </svg>
      );
    };

    const CreatureSprite = ({ type, size = 48, isEnemy = false, scarCount = 0, scars = null, isHollowed = false, bossPhase = 1, animated = true }) => {
      // Determine which sprite variant to use
      const effectiveScarCount = scars ? scars.length : scarCount;
      const useHollowed = isHollowed || effectiveScarCount >= SCAR_THRESHOLD_HOLLOWED;

      // Check if we have PNG sprite frames loaded for this type
      const isBossType = type === 'boss' || type === 'hollowWarden';
      let frames = null;

      if (isBossType) {
        const phaseKey = bossPhase === 2 ? 'phase2' : 'phase1';
        frames = preloadedSprites.creatures[type]?.[phaseKey]?.idle;
      } else {
        const variant = useHollowed ? 'hollowed' : 'base';
        frames = preloadedSprites.creatures[type]?.[variant]?.idle;
        // Fall back to base if hollowed not available
        if (!frames && useHollowed) {
          frames = preloadedSprites.creatures[type]?.base?.idle;
        }
      }

      const body = (frames && frames.length > 0) ? (
        // Battle animations use 8fps (125ms) for more dynamic feel
        <AnimatedSprite
          frames={frames}
          frameRate={125}
          size={size}
          flip={isEnemy}
          filter={useHollowed && !isBossType ? 'saturate(0.5) brightness(0.8)' : 'none'}
          playing={animated}
        />
      ) : (
        // Fall back to SVG sprite (no animation)
        <FallbackCreatureSprite type={type} size={size} isEnemy={isEnemy} />
      );

      // Bosses don't carry scars, so skip the overlay entirely for them
      if (isBossType || !scars || scars.length === 0) return body;

      return (
        <div style={{ position: 'relative', display: 'inline-block', width: size, height: size }}>
          {body}
          <ScarOverlay scars={scars} size={size} isEnemy={isEnemy} />
        </div>
      );
    };

    // Shared organic-flame path: a teardrop pointed at (cx, baseY - height),
    // rounded at the base. Reused by BonfireTile, TorchTile, and the lore
    // torch object so every flame in the game reads as one consistent shape.
    const flameTeardrop = (cx, baseY, height, width) => {
      const tipY = baseY - height;
      return `M${cx},${tipY} C${cx - width},${tipY + height * 0.4} ${cx - width},${baseY - height * 0.1} ${cx},${baseY}
              C${cx + width},${baseY - height * 0.1} ${cx + width},${tipY + height * 0.4} ${cx},${tipY} Z`;
    };

    // Shared small flagstone-base backdrop for object tiles (gather nodes,
    // lore props): three irregular stones so objects don't sit on a bare
    // rect. Deliberately simpler than PathTile's full floor treatment.
    const flagstoneBase = (palette) => (
      <svg width="56" height="56" style={{ position: 'absolute', top: 0, left: 0 }}>
        <path d={`M3,5 Q9,3 15,5 Q17,8 15,11 Q9,13 3,11 Q1,8 3,5 Z`} fill={palette.pathLight}/>
        <path d={`M22,3 Q29,1 36,3 Q38,7 36,11 Q29,13 22,11 Q20,7 22,3 Z`} fill={palette.pathDark}/>
        <path d={`M44,8 Q49,6 53,8 Q54,11 53,14 Q49,16 44,14 Q43,11 44,8 Z`} fill={palette.pathLight}/>
      </svg>
    );

    // Tile components - area-aware for distinct visual styles.
    // All are React.memo with primitive props: the whole grid re-renders on
    // every step, so memoization is what pays for the visual detail.
    const GrassTile = React.memo(({ area = 'ashenPath', seed = 0, wallAbove = false }) => {
      const palette = AREA_PALETTES[area] || AREA_PALETTES.ashenPath;
      const isHollow = area === 'hollowDeep';
      const isLabyrinth = area === 'labyrinth';
      const hasBloom = isLabyrinth && seed % 3 === 0;
      const bloomX = 10 + (seed % 5) * 8;
      const bloomY = 14 + (seed % 4) * 9;
      const grassTip = palette.grassTip || palette.grassLight;

      // Tapered blade path: a narrow curved wedge from (bx,baseY) up to a
      // point near (bx+lean,baseY-height). Q-curved on both edges so blades
      // read as organic, not as ruler-straight rects.
      const blade = (bx, baseY, height, width, lean) => {
        const tipX = bx + lean;
        const tipY = baseY - height;
        const midY = baseY - height * 0.55;
        return `M${bx - width / 2},${baseY} Q${bx - width / 2 + lean * 0.3},${midY} ${tipX},${tipY} Q${bx + width / 2 + lean * 0.3},${midY} ${bx + width / 2},${baseY} Z`;
      };

      return (
        <div style={{
          width: '100%',
          height: '100%',
          background: `linear-gradient(180deg, ${palette.grassMid} 0%, ${palette.grassDark} 100%)`,
          position: 'relative',
          overflow: 'hidden'
        }}>
          {/* Grass blades pattern; mirrored and desynced per tile so a field
              of grass does not sway as one repeated block */}
          <svg width="56" height="56" style={{
            position: 'absolute',
            top: 0,
            left: 0,
            transform: seed % 2 === 1 ? 'scaleX(-1)' : 'none',
            animation: 'grassSway 2s ease-in-out infinite',
            animationDelay: `${(seed % 5) * 0.35}s`
          }}>
            <defs>
              <linearGradient id={"gg" + seed} x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stopColor={palette.grassDark}/>
                <stop offset="100%" stopColor={palette.grassLight}/>
              </linearGradient>
            </defs>
            {/* Back layer: fuller, slightly shorter blades */}
            <path d={blade(7, 46, 18, 4, -2)} fill={`url(#gg${seed})`}/>
            <path d={blade(17, 50, 22, 4, 3)} fill={`url(#gg${seed})`}/>
            <path d={blade(29, 44, 20, 4, -3)} fill={`url(#gg${seed})`}/>
            <path d={blade(41, 48, 16, 3.5, 2)} fill={`url(#gg${seed})`}/>
            <path d={blade(51, 46, 19, 3.5, -2)} fill={`url(#gg${seed})`}/>
          </svg>
          <svg width="56" height="56" style={{
            position: 'absolute',
            top: 0,
            left: 0,
            transform: seed % 2 === 1 ? 'scaleX(-1)' : 'none',
            animation: 'grassSway 2s ease-in-out infinite',
            animationDelay: `${(seed % 5) * 0.35 + 0.15}s`
          }}>
            <defs>
              <linearGradient id={"gt" + seed} x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stopColor={palette.grassMid}/>
                <stop offset="100%" stopColor={grassTip}/>
              </linearGradient>
            </defs>
            {/* Front layer: thinner blades layered over the back for depth */}
            <path d={blade(12, 52, 14, 2.5, 1)} fill={`url(#gt${seed})`}/>
            <path d={blade(23, 50, 15, 2.5, -2)} fill={`url(#gt${seed})`}/>
            <path d={blade(35, 53, 12, 2, 2)} fill={`url(#gt${seed})`}/>
            <path d={blade(46, 51, 14, 2.5, -1)} fill={`url(#gt${seed})`}/>
          </svg>
          {/* Labyrinth blooms: pretty flowers in a place that should not have them */}
          {hasBloom && (
            <svg width="56" height="56" style={{ position: 'absolute', top: 0, left: 0 }}>
              <circle cx={bloomX} cy={bloomY} r="2.2" fill={palette.bloom}/>
              <path d={`M${bloomX},${bloomY - 1} Q${bloomX + 1.5},${bloomY - 4} ${bloomX + 1},${bloomY - 6}`} stroke={palette.grassLight} strokeWidth="1" fill="none" strokeLinecap="round"/>
            </svg>
          )}
          {/* Void particles for Hollow Deep */}
          {isHollow && (
            <>
              <div style={{
                position: 'absolute',
                top: '8px',
                left: '12px',
                width: '4px',
                height: '4px',
                backgroundColor: palette.void,
                borderRadius: '50%',
                animation: 'ember 2s infinite',
                opacity: 0.7
              }}/>
              <div style={{
                position: 'absolute',
                bottom: '12px',
                right: '10px',
                width: '3px',
                height: '3px',
                backgroundColor: palette.accent,
                borderRadius: '50%',
                animation: 'ember 2.5s infinite 0.5s',
                opacity: 0.6
              }}/>
            </>
          )}
          {/* Area pulse: static shadow, opacity-only animation (compositor
              friendly; the old voidPulse/mazeGlow animated box-shadow) */}
          {isHollow && <div className="pulse-overlay-void"/>}
          {isLabyrinth && <div className="pulse-overlay-maze"/>}
          {/* Ambient occlusion under walls: floors sit lower than stone */}
          {wallAbove && (
            <div style={{
              position: 'absolute',
              top: 0,
              left: 0,
              right: 0,
              height: '10px',
              background: `linear-gradient(180deg, ${palette.pathShadow}, transparent)`,
              opacity: 0.8,
              pointerEvents: 'none'
            }}/>
          )}
        </div>
      );
    });

    const PathTile = React.memo(({ area = 'ashenPath', seed = 0, wallAbove = false, lit = null }) => {
      const palette = AREA_PALETTES[area] || AREA_PALETTES.ashenPath;
      const isLabyrinth = area === 'labyrinth';
      const isKeep = area === 'fallenKeep';
      const isHollow = area === 'hollowDeep';

      // Deterministic per-tile variety: mirror/rotate the shared texture and
      // sprinkle occasional details so floors stop reading as wallpaper.
      // Seeded from tile coordinates, never Math.random(), so nothing
      // flickers between re-renders.
      const variant = seed % 4;
      const textureTransform = variant === 1 ? 'scaleX(-1)' : variant === 2 ? 'rotate(180deg)' : variant === 3 ? 'rotate(90deg)' : 'none';
      const hasCrack = seed % 7 === 3;
      const hasPebbles = seed % 5 === 1;
      const hasWind = area === 'ashenPath' && seed % 6 === 2;
      const hasLeaves = isLabyrinth && seed % 5 === 2;
      const hasJoints = isKeep && seed % 4 === 2;
      const hasSpeckle = isHollow && seed % 8 === 5;
      const detailX = 8 + (seed % 4) * 9;
      const detailY = 12 + (seed % 3) * 11;

      // Irregular flagstone: a soft-curved quadrilateral, not a rect. Each
      // corner nudged slightly so edges read as worn stone.
      const stone = (x, y, w, h, n) => {
        const j = (n % 3) - 1; // small jitter, deterministic
        return `M${x + j},${y} Q${x + w / 2},${y - 2 + j} ${x + w},${y + j}
                Q${x + w + 2},${y + h / 2} ${x + w},${y + h}
                Q${x + w / 2},${y + h + 2} ${x},${y + h}
                Q${x - 2},${y + h / 2} ${x + j},${y} Z`;
      };

      return (
        <div style={{
          width: '100%',
          height: '100%',

    const WallTile = React.memo(({ area = 'ashenPath', seed = 0, openBelow = false }) => {

      // repeating as one block. Deterministic, never Math.random().
      const variant = seed % 3;
      const textureTransform = variant === 1 ? 'scaleX(-1)' : variant === 2 ? 'rotate(180deg)' : 'none';
      const hasScorch = isAshen && seed % 6 === 2;
      const hasChip = isKeep && seed % 5 === 3;

      const block = (x, y, w, h) => {
        const r = Math.min(w, h) * 0.18;
        return `M${x + r},${y} L${x + w - r},${y} Q${x + w},${y} ${x + w},${y + r}
                L${x + w},${y + h - r} Q${x + w},${y + h} ${x + w - r},${y + h}
                L${x + r},${y + h} Q${x},${y + h} ${x},${y + h - r}

                <path d={`M${detailX - 2},${detailY + 2} Q${detailX - 1},${detailY + 5.5} ${detailX - 2},${detailY + 9}`} stroke={palette.grassDark} strokeWidth="2" fill="none" opacity="0.6" strokeLinecap="round"/>

    const BonfireTile = React.memo(({ area = 'ashenPath' }) => {

    // Torch tile for Fallen Keep atmosphere

          {/* Layered torchlight: bright core, warm falloff */}
          <div style={{

    // Ashen Gate - massive door at end of Labyrinth
    const AshenGateTile = React.memo(({ area = 'labyrinth' }) => {
      const palette = AREA_PALETTES.labyrinth;

      return (
        <div style={{
          width: '100%',

        }}>

    // ============= BATTLE HELPERS =============
    // Unscarred: the Hollow Warden falls and no creature carries a mark.
    // Returns extra fields to merge into a boss-victory state (or nothing).
    function bossVictoryTitleFields(state, newTeam) {
      if (!state.isHollowWardenFight) return {};
      if (state.titles.includes('unscarred')) return {};
      if (!newTeam.every(c => (c.scars || []).length === 0)) return {};
      return {
        titles: [...state.titles, 'unscarred'],
        activeTitle: 'unscarred',
        saveNotification: 'Title earned: Unscarred'
      };
    }

    function handleCreatureFaint(state, team, enemy, log, cause) {
      const difficulty = getDifficulty(state);
      const activeCreature = team[state.activeCreatureIndex];
      const scar = getScarForDeathCause(activeCreature, cause, difficulty);

      activeCreature.hp = 0;
      activeCreature.scars = [...(activeCreature.scars || []), scar];

      log.push(`${activeCreature.nickname || activeCreature.name} has fallen!`);
      log.push(`The death leaves its mark: ${scar.name}.`);
      log.push(`  → ${scar.name}: ${scar.description}`);
      if (scar.upsideDescription) {
        log.push(`  → But the flame remembers: ${scar.upsideDescription}`);
      }

      if (activeCreature.scars.length >= difficulty.hollowedThreshold) {
        log.push(`${activeCreature.nickname || activeCreature.name} has become Hollowed...`);
      }

      team[state.activeCreatureIndex] = activeCreature;

      const availableIndex = team.findIndex((c, i) => i !== state.activeCreatureIndex && c.hp > 0);

      if (availableIndex === -1) {
        // Calculate souls to drop based on difficulty
        let soulsToDrop = Math.floor(state.souls * difficulty.soulDropPercent);
        if (difficulty.dropBankedSouls) {
          soulsToDrop += state.bankedSouls;
        }

        const droppedSouls = soulsToDrop > 0 ? {
          map: state.currentMap,
          pos: { ...state.playerPos },
          amount: soulsToDrop
        } : state.droppedSouls;

        // Add boss death dialogue if dying to boss
        if (state.isBossFight) {
          BOSS_DIALOGUE.playerDeath.forEach(line => log.push(line));
        }

        return {
          ...state,
          screen: 'gameOver',
          team,
          enemy,
          battleLog: log,
          souls: 0,
          bankedSouls: difficulty.dropBankedSouls ? 0 : state.bankedSouls,
          droppedSouls,
          diedToBoss: state.isBossFight,
          pendingMove: null
        };
      }

      return {
        ...state,
        team,
        enemy,
        battleLog: log,
        activeCreatureIndex: availableIndex,
        turnPhase: 'player',
        pendingMove: null
      };
    }

    // ============= GAME REDUCER =============
    function gameReducer(state, action) {
      switch (action.type) {
        case 'CREATE_CHARACTER': {
          if (!action.name || !action.appearance) return state;
          return {
            ...state,
            playerName: action.name.trim(),
            playerAppearance: action.appearance,
            screen: 'difficulty'
          };
        }

        case 'SELECT_DIFFICULTY': {
          return {
            ...state,
            difficulty: action.difficulty,
            screen: 'starter'
          };
        }

        case 'SELECT_STARTER': {
          const starterData = STARTERS[action.starter];
          const newCreature = {
            ...starterData,
            hp: starterData.maxHp,
            stamina: starterData.maxStamina,
            scars: [],
            winded: false,
            isGuarding: false,
            burnTurns: 0,
            poisonTurns: 0,
            chillTurns: 0
          };
          // Show prologue on first playthrough; repeat runs get the goal card
          const nextScreen = state.hasSeenPrologue ? 'exploration' : 'prologue';
          // First Flame: it IS the demo period - lighting a starter earns it
          const earnsFirstFlame = !state.titles.includes('first_flame');
          return {
            ...state,
            screen: nextScreen,
            team: [newCreature],
            titles: earnsFirstFlame ? [...state.titles, 'first_flame'] : state.titles,
            activeTitle: state.activeTitle || 'first_flame',
            saveNotification: earnsFirstFlame ? 'Title earned: First Flame' : state.saveNotification,
            visitedTiles: revealAround(
              state.visitedTiles, state.currentMap,
              state.playerPos.x, state.playerPos.y,
              GAME_CONFIG.cartography.revealRadius, MAPS_BY_ID[state.currentMap]
            ),
            examineText: nextScreen === 'exploration'
              ? { name: RUN_GOAL_TEXT.name, lines: RUN_GOAL_TEXT.lines }
              : state.examineText
          };
        }

        case 'CONTINUE_FROM_PROLOGUE': {
          return {
            ...state,
            screen: 'exploration',
            hasSeenPrologue: true,
            visitedTiles: revealAround(
              state.visitedTiles, state.currentMap,
              state.playerPos.x, state.playerPos.y,
              GAME_CONFIG.cartography.revealRadius, MAPS_BY_ID[state.currentMap]
            ),
            // Every run opens by stating the goal (playtest: "no arc to follow")
            examineText: { name: RUN_GOAL_TEXT.name, lines: RUN_GOAL_TEXT.lines }
          };
        }

        case 'EXAMINE_TILE': {
          const key = `${state.playerPos.x},${state.playerPos.y}`;
          const lore = TILE_LORE[state.currentMap]?.[key];

          // Gathering node: harvest for souls, spring an ambush, or find it
          // spent. Deliberate EO-style gathering: examining is a choice,
          // walking over the node never interrupts.
          const gather = GAME_CONFIG.gathering.enabled ? GATHER_POINTS[state.currentMap]?.[key] : null;
          if (gather) {
            const gatherKey = `${state.currentMap}:${key}`;
            if ((state.gatheredPoints || []).includes(gatherKey)) {
              return {
                ...state,
                examineText: {
                  name: gather.name,
                  lines: ['The vein is spent.', '', 'Rest at a bonfire and the ash regrows.']
                }
              };
            }
            if (Math.random() < GAME_CONFIG.gathering.ambushChance) {
              // The node is NOT depleted: win the fight and try again.
              // Straight to battle (no preview), so there is no fleeing.
              const wildData = state.currentMap === 'labyrinth' ? getRandomLabyrinthWild() : state.currentMap === 'hollowDeep' ? getRandomDeepWild() : getRandomWild();
              let actualMaxHp = wildData.maxHp;
              let actualMaxStamina = wildData.maxStamina;
              if (wildData.scars) {
                wildData.scars.forEach(scar => {
                  if (scar.effect === 'maxHp') actualMaxHp = Math.max(15, actualMaxHp + scar.value);
                  if (scar.effect === 'maxStamina') actualMaxStamina = Math.max(8, actualMaxStamina + scar.value);
                });
              }
              return {
                ...state,
                screen: 'battle',
                enemy: {
                  ...wildData,
                  maxHp: actualMaxHp,
                  maxStamina: actualMaxStamina,
                  hp: actualMaxHp,
                  stamina: actualMaxStamina,
                  winded: false,
                  isGuarding: false
                },
                enemyCreature: wildData,
                battleLog: [
                  'Something was waiting in the ash!',
                  `A ${wildData.name} lunges from the ${gather.name}!`
                ],
                turnPhase: 'player',
                pendingMove: null,
                bossTelegraph: null,
                bossTelegraphCooldown: 0,
                bossPhase: 1,
                arenaEffect: null,
                isBossFight: false,
                isHollowWardenFight: false,
                currentEncounter: null,
                pendingEncounter: null,
                bonfireMenuOpen: false,
                withdrawMenuOpen: false,
                depositMenuOpen: false,
                kindleMenuOpen: false,
                titlesMenuOpen: false
              };
            }
            const min = gather.souls?.min ?? GAME_CONFIG.gathering.soulsMin;
            const max = gather.souls?.max ?? GAME_CONFIG.gathering.soulsMax;
            const gained = min + Math.floor(Math.random() * (max - min + 1));
            return {
              ...state,
              souls: state.souls + gained,
              gatheredPoints: [...(state.gatheredPoints || []), gatherKey],
              examineText: {
                name: gather.name,
                lines: [
                  gather.kind === 'chop' ? 'You cut deep into the growth.'
                    : gather.kind === 'mine' ? 'You pry the vein open.'
                    : 'You sift through the ash.',
                  '',
                  `${gained} souls glimmer in your hand.`,
                  '',
                  'The node is spent. Rest at a bonfire and the ash regrows.'
                ]
              }
            };
          }

          // Labyrinth secret room clue tracking
          const LABYRINTH_CLUES = ['16,1', '1,7', '4,15', '17,17'];
          const isLabyrinthClue = state.currentMap === 'labyrinth' && LABYRINTH_CLUES.includes(key);
          const isSecretDoor = state.currentMap === 'labyrinth' && key === '15,9';

          if (lore) {
            let newState = { ...state, examineText: lore };

            // Track clue discovery
            if (isLabyrinthClue && !state.cluesFound.includes(key)) {
              const newClues = [...state.cluesFound, key];
              newState.cluesFound = newClues;

              // All 4 clues found - reveal secret door
              if (newClues.length >= 4) {
                newState.secretDoorRevealed = true;
                newState.saveNotification = 'Something shifts in the labyrinth...';
                // Append hint to current lore text
                newState.examineText = {
                  ...newState.examineText,
                  lines: [...(newState.examineText.lines || []), '', '...A distant sound of grinding stone echoes through the maze.']
                };
              }
            }

            // Special lore when examining revealed secret door
            if (isSecretDoor && state.secretDoorRevealed) {
              newState.examineText = {
                name: 'Hidden Chamber',
                lines: [
                  'The wall yields to your knowledge.',
                  '',
                  'A hidden chamber opens before you.'
                ]
              };
              // Award title for discovering the secret
              if (!state.titles.includes('ashen_seeker')) {
                newState.titles = [...state.titles, 'ashen_seeker'];
                newState.activeTitle = 'ashen_seeker';
                newState.saveNotification = 'Title earned: Ashen Seeker';
              }
            }

            return newState;
          }
          return state;
        }

        case 'CLOSE_EXAMINE': {
          return {
            ...state,
            examineText: null
          };
        }

        case 'MOVE_PLAYER': {
          // A held-key or auto-path timer can fire one last time as a battle
          // or menu screen takes over; movement only ever means exploration
          if (state.screen !== 'exploration') return state;
          const map = state.currentMap === 'ashenPath' ? ASHEN_PATH :
                      state.currentMap === 'hollowDeep' ? HOLLOW_DEEP :
                      state.currentMap === 'labyrinth' ? LABYRINTH : FALLEN_KEEP;
          const newX = state.playerPos.x + action.dx;
          const newY = state.playerPos.y + action.dy;

          // Determine direction
          let dir = state.playerDir;
          if (action.dy < 0) dir = 'up';
          else if (action.dy > 0) dir = 'down';
          else if (action.dx < 0) dir = 'left';
          else if (action.dx > 0) dir = 'right';

          if (newY < 0 || newY >= map.length || newX < 0 || newX >= map[0].length) {
            return { ...state, playerDir: dir };
          }

          const tile = map[newY][newX];

          if (tile === 'W') return { ...state, playerDir: dir };

          // Secret door blocks movement until revealed
          if (tile === 'S' && !state.secretDoorRevealed) {
            return { ...state, playerDir: dir };
          }

          // Walking into revealed secret door awards Ashen Seeker title
          if (tile === 'S' && state.secretDoorRevealed) {
            let sState = { ...state, playerPos: { x: newX, y: newY }, playerDir: dir, bonfireMenuOpen: false, withdrawMenuOpen: false, depositMenuOpen: false, kindleMenuOpen: false, titlesMenuOpen: false };
            sState.examineText = {
              name: 'The Hidden Chamber',
              lines: [
                'The wall crumbles. Beyond, a small chamber.',
                '',
                'A single flame burns in the darkness.',
                '',
                'You have found what others could not.',
                '',
                'You are an Ashen Seeker.'
              ]
            };
            if (!state.titles.includes('ashen_seeker')) {
              sState.titles = [...state.titles, 'ashen_seeker'];
              sState.activeTitle = 'ashen_seeker';
              sState.saveNotification = 'Title earned: Ashen Seeker';
            }
            return sState;
          }

          // The Keeper: walking into them talks; the tile never opens
          if (tile === 'C') {
            return {
              ...state,
              playerDir: dir,
              examineText: { name: KEEPER_DIALOGUE.name, lines: KEEPER_DIALOGUE.lines }
            };
          }

          // Sentinel bars the tile until defeated: the player does not move, the
          // fight starts directly (no preview, so it cannot be fled). Once dead
          // the tile behaves like path.
          if (tile === 'N') {
            const sentinel = SENTINELS[state.currentMap];
            if (sentinel && !(state.sentinelsDefeated || []).includes(sentinel.id)) {
              return {
                ...state,
                playerDir: dir,
                screen: 'battle',
                enemy: {
                  ...sentinel,
                  hp: sentinel.maxHp,
                  stamina: sentinel.maxStamina,
                  winded: false,
                  isGuarding: false
                },
                enemyCreature: sentinel,
                battleLog: [
                  `${sentinel.name} bars the way!`,
                  'It will not move, and it will not let you flee.'
                ],
                turnPhase: 'player',
                pendingMove: null,
                bossTelegraph: null,
                bossTelegraphCooldown: 0,
                bossPhase: 1,
                arenaEffect: null,
                isBossFight: false,
                isHollowWardenFight: false,
                isSentinelFight: true,
                currentSentinelId: sentinel.id,
                currentEncounter: null,
                pendingEncounter: null,
                bonfireMenuOpen: false,
                withdrawMenuOpen: false,
                depositMenuOpen: false,
                kindleMenuOpen: false,
                titlesMenuOpen: false
              };
            }
          }

          // A living FOE on the target tile: walking into it is a challenge.
          // Straight to battle like a sentinel (no preview, no fleeing); the
          // player does not move.
          if (GAME_CONFIG.foes.enabled) {
            const blockingFoe = FOES.find(f => {
              if (f.area !== state.currentMap) return false;
              if ((state.foesDefeated || []).includes(f.id)) return false;
              const p = (state.foePositions || {})[f.id];
              return p && p.x === newX && p.y === newY;
            });
            if (blockingFoe) {
              return {
                ...state,
                playerDir: dir,
                screen: 'battle',
                enemy: {
                  ...blockingFoe,
                  hp: blockingFoe.maxHp,
                  stamina: blockingFoe.maxStamina,
                  winded: false,
                  isGuarding: false
                },
                enemyCreature: blockingFoe,
                battleLog: [
                  `The ${blockingFoe.name} turns. It has been waiting.`,
                  'There is nowhere to run.'
                ],
                turnPhase: 'player',
                pendingMove: null,
                bossTelegraph: null,
                bossTelegraphCooldown: 0,
                bossPhase: 1,
                arenaEffect: null,
                isBossFight: false,
                isHollowWardenFight: false,
                currentFoeId: blockingFoe.id,
                currentEncounter: null,
                pendingEncounter: null,
                bonfireMenuOpen: false,
                withdrawMenuOpen: false,
                depositMenuOpen: false,
                kindleMenuOpen: false,
                titlesMenuOpen: false
              };
            }
          }

          let newState = { ...state, playerPos: { x: newX, y: newY }, playerDir: dir, bonfireMenuOpen: false, withdrawMenuOpen: false, depositMenuOpen: false, kindleMenuOpen: false, titlesMenuOpen: false };

          if (tile === 'G' && (state.currentMap === 'ashenPath' || state.currentMap === 'hollowDeep' || state.currentMap === 'labyrinth')) {
            const encounter = state.grassEncounters.find(
              e => e.x === newX && e.y === newY && e.map === state.currentMap && e.active
            );
            if (encounter && !encounter.alerted && Math.random() < GAME_CONFIG.wildEncounters.grassEncounterChance) {
              const wildData = state.currentMap === 'labyrinth' ? getRandomLabyrinthWild() : state.currentMap === 'hollowDeep' ? getRandomDeepWild() : getRandomWild();
              // Apply scar penalties if pre-scarred
              let actualMaxHp = wildData.maxHp;
              let actualMaxStamina = wildData.maxStamina;
              if (wildData.scars) {
                wildData.scars.forEach(scar => {
                  if (scar.effect === 'maxHp') actualMaxHp = Math.max(15, actualMaxHp + scar.value);
                  if (scar.effect === 'maxStamina') actualMaxStamina = Math.max(8, actualMaxStamina + scar.value);
                });
              }
              // Show pre-battle preview instead of immediately starting battle
              newState = {
                ...newState,
                screen: 'encounterPreview',
                pendingEncounter: {
                  wildData,
                  actualMaxHp,
                  actualMaxStamina,
                  encounter: { x: newX, y: newY }
                }
              };
            }
          }

          if (tile === 'X') {
            newState = {
              ...newState,
              currentMap: 'fallenKeep',
              playerPos: { x: 2, y: 7 }
            };
          }

          if (tile === 'E' && state.currentMap === 'fallenKeep') {
            newState = {
              ...newState,
              currentMap: 'ashenPath',
              playerPos: { x: 2, y: 6 }
            };
          }

          // Soul-toll seal on the boss door: the first approach demands carried
          // souls. Unpaid, the door blocks; paid once, it stays open forever
          // (persisted), even across deaths. The step that pays does not start
          // the fight, so paying and fighting are two deliberate moves.
          if (tile === 'K' && state.currentMap === 'fallenKeep' && !state.bossDefeated &&
              !(state.tollsPaid || []).includes('fallenKeep') && GAME_CONFIG.souls.gateTolls.fallenKeep > 0) {
            const toll = GAME_CONFIG.souls.gateTolls.fallenKeep;
            if (state.souls < toll) {
              return {
                ...state,
                playerDir: dir,
                examineText: {
                  name: 'The Sealed Door',
                  lines: [
                    'A seal of old flame bars the door.',
                    '',
                    `It demands ${toll} souls.`,
                    `You carry ${state.souls}.`
                  ]
                }
              };
            }
            return {
              ...state,
              playerDir: dir,
              souls: state.souls - toll,
              tollsPaid: [...(state.tollsPaid || []), 'fallenKeep'],
              examineText: {
                name: 'The Sealed Door',
                lines: [
                  `The seal drinks ${toll} souls.`,
                  '',
                  'The way is open.',
                  'What waits inside has been listening.'
                ]
              }
            };
          }

          if (tile === 'K' && state.currentMap === 'fallenKeep' && !state.bossDefeated) {
            const bossData = BOSS.obsidianHound;
            const difficulty = getDifficulty(state);
            const bossMaxHp = Math.floor(bossData.maxHp * difficulty.bossHpMult);
            newState = {
              ...newState,
              screen: 'battle',
              enemy: {
                ...bossData,
                maxHp: bossMaxHp,
                hp: bossMaxHp,
                stamina: bossData.maxStamina,
                winded: false,
                isGuarding: false
              },
              enemyCreature: { ...bossData, maxHp: bossMaxHp },
              battleLog: [
                'Keeper Varek blocks your path!',
                ...BOSS_DIALOGUE.intro
              ],
              turnPhase: 'player',
              pendingMove: null,
              bossPhase: 1,
              arenaEffect: null,
              isBossFight: true,
              bossTelegraph: null,
              // 2 so one normal exchange teaches the baseline before the first wind-up
              bossTelegraphCooldown: 2
            };
          }

          // Enter The Hollow Deep after defeating Varek
          if (tile === 'K' && state.currentMap === 'fallenKeep' && state.bossDefeated && !state.hollowWardenDefeated) {
            newState = {
              ...newState,
              currentMap: 'hollowDeep',
              playerPos: { x: 3, y: 7 }
            };
          }

          // Exit The Hollow Deep back to Fallen Keep
          if (tile === 'E' && state.currentMap === 'hollowDeep') {
            newState = {
              ...newState,
              currentMap: 'fallenKeep',
              playerPos: { x: 1, y: 6 }
            };
          }

          // Enter The Labyrinth from Hollow Deep (X tile at 8,14)
          if (tile === 'X' && state.currentMap === 'hollowDeep') {
            newState = {
              ...newState,
              currentMap: 'labyrinth',
              playerPos: { x: 9, y: 17 }
            };
          }

          // Exit The Labyrinth back to Hollow Deep (E tile at 9,18)
          if (tile === 'E' && state.currentMap === 'labyrinth') {
            newState = {
              ...newState,
              currentMap: 'hollowDeep',
              playerPos: { x: 8, y: 13 }
            };
          }

          // Soul-toll seal on the Hollow Warden's door (see Fallen Keep above)
          if (tile === 'K' && state.currentMap === 'hollowDeep' && !state.hollowWardenDefeated &&
              !(state.tollsPaid || []).includes('hollowDeep') && GAME_CONFIG.souls.gateTolls.hollowDeep > 0) {
            const toll = GAME_CONFIG.souls.gateTolls.hollowDeep;
            if (state.souls < toll) {
              return {
                ...state,
                playerDir: dir,
                examineText: {
                  name: 'The Hollow Seal',
                  lines: [
                    'A seal of hollow light bars the way.',
                    '',
                    `It demands ${toll} souls.`,
                    `You carry ${state.souls}.`
                  ]
                }
              };
            }
            return {
              ...state,
              playerDir: dir,
              souls: state.souls - toll,
              tollsPaid: [...(state.tollsPaid || []), 'hollowDeep'],
              examineText: {
                name: 'The Hollow Seal',
                lines: [
                  `The seal drinks ${toll} souls.`,
                  '',
                  'The hollow light parts before you.'
                ]
              }
            };
          }

          // Hollow Warden boss fight
          if (tile === 'K' && state.currentMap === 'hollowDeep' && !state.hollowWardenDefeated) {
            const bossData = BOSS.hollowWarden;
            const difficulty = getDifficulty(state);
            const bossMaxHp = Math.floor(bossData.maxHp * difficulty.bossHpMult);
            newState = {
              ...newState,
              screen: 'battle',
              enemy: {
                ...bossData,
                maxHp: bossMaxHp,
                hp: bossMaxHp,
                stamina: bossData.maxStamina,
                winded: false,
                isGuarding: false
              },
              enemyCreature: { ...bossData, maxHp: bossMaxHp },
              battleLog: [
                'The Hollow Warden awakens!',
                ...HOLLOW_WARDEN_DIALOGUE.intro
              ],
              turnPhase: 'player',
              pendingMove: null,
              bossPhase: 1,
              arenaEffect: null,
              isBossFight: true,
              isHollowWardenFight: true,
              bossTelegraph: null,
              // 2 so one normal exchange teaches the baseline before the first wind-up
              bossTelegraphCooldown: 2
            };
          }

          if (state.droppedSouls &&
              state.droppedSouls.map === state.currentMap &&
              state.droppedSouls.pos.x === newX &&
              state.droppedSouls.pos.y === newY) {
            newState = {
              ...newState,
              souls: state.souls + state.droppedSouls.amount,
              droppedSouls: null,
              battleLog: [`Recovered ${state.droppedSouls.amount} souls!`]
            };
          }

          if (state.currentMap === 'fallenKeep' && newY <= 3) {
            newState.shortcutUnlocked = true;
          }

          // Crossing a gate resets patrols: FOEs return to their posts while
          // the player is elsewhere, and positions are never saved
          if (newState.currentMap !== state.currentMap) {
            newState.foePositions = getInitialFoePositions();
          }

          // Chart the step. Uses newState because gate transitions above may
          // have swapped currentMap/playerPos; early returns (walls, keeper,
          // sentinels, unpaid tolls) never reach here and reveal nothing.
          if (GAME_CONFIG.cartography.enabled) {
            newState.visitedTiles = revealAround(
              newState.visitedTiles, newState.currentMap,
              newState.playerPos.x, newState.playerPos.y,
              GAME_CONFIG.cartography.revealRadius, MAPS_BY_ID[newState.currentMap]
            );
          }

          // FOEs move one tile per player step, Etrian-style. Skipped when
          // this step already opened another screen (encounter preview, boss
          // intro): one threat at a time. Also skipped on a map transition:
          // patrols were just rebuilt at their posts and the player hasn't
          // taken a step on the new map yet.
          if (GAME_CONFIG.foes.enabled && newState.screen === 'exploration' && newState.currentMap === state.currentMap) {
            const stepped = stepFoes(
              newState.currentMap,
              newState.foePositions || getInitialFoePositions(),
              newState.foesDefeated || [],
              newState.playerPos,
              GAME_CONFIG.foes.aggroRange
            );
            newState.foePositions = stepped.foePositions;
            if (stepped.collidedFoeId) {
              const huntingFoe = FOES.find(f => f.id === stepped.collidedFoeId);
              newState = {
                ...newState,
                screen: 'battle',
                enemy: {
                  ...huntingFoe,
                  hp: huntingFoe.maxHp,
                  stamina: huntingFoe.maxStamina,
                  winded: false,
                  isGuarding: false
                },
                enemyCreature: huntingFoe,
                battleLog: [
                  `The ${huntingFoe.name} catches you!`,
                  'There is nowhere to run.'
                ],
                turnPhase: 'player',
                pendingMove: null,
                bossTelegraph: null,
                bossTelegraphCooldown: 0,
                bossPhase: 1,
                arenaEffect: null,
                isBossFight: false,
                isHollowWardenFight: false,
                currentFoeId: huntingFoe.id,
                currentEncounter: null,
                pendingEncounter: null
              };
            }
          }

          return newState;
        }

        case 'INTERACT_BONFIRE': {
          // Toggle bonfire menu
          return {
            ...state,
            bonfireMenuOpen: !state.bonfireMenuOpen
          };
        }

        case 'REST_AT_BONFIRE': {
          const difficulty = getDifficulty(state);

          const team = state.team.map(creature => {
            const baseData = STARTERS[creature.id];
            // Clear scars on Ashen difficulty
            const scars = difficulty.scarsHealAtBonfire ? [] : creature.scars;
            const creatureWithScars = { ...creature, scars };
            const { maxHp, maxStamina } = applyScars(creatureWithScars, baseData, difficulty.hollowedThreshold);

            // Broken difficulty: bonfire doesn't heal HP
            if (!difficulty.bonfireHeals) {
              return {
                ...creature,
                scars,
                stamina: maxStamina,
                winded: false,
                burnTurns: 0,
                poisonTurns: 0,
                chillTurns: 0
              };
            }

            return {
              ...creature,
              scars,
              hp: creature.hp === 0 ? 1 : maxHp,
              stamina: maxStamina,
              winded: false,
              burnTurns: 0,
              poisonTurns: 0,
              chillTurns: 0
            };
          });

          const grassEncounters = state.grassEncounters.map(e => ({ ...e, active: true }));

          // Resting respawns enemies; the ash regrows over gather nodes too
          const gatheredPoints = GAME_CONFIG.gathering.respawnOnRest ? [] : (state.gatheredPoints || []);
          // Rest passes time: surviving patrols return to their posts
          const foePositions = getInitialFoePositions();

          const bonfireMessages = [
            "Progress saved. Enemies respawned. Life is compromise.",
            "Rested. Ready to make the same mistakes."
          ];
          const saveMessage = difficulty.bonfireHeals
            ? bonfireMessages[Math.floor(Math.random() * bonfireMessages.length)]
            : "Progress saved. No healing. Broken mode is fun, right?";

          const newState = {
            ...state,
            team,
            grassEncounters,
            gatheredPoints,
            foePositions,
            currentFoeId: null,
            lastBonfire: { map: state.currentMap, pos: { ...state.playerPos } },
            bonfireMenuOpen: false,
            withdrawMenuOpen: false,
            depositMenuOpen: false,
            kindleMenuOpen: false,
            titlesMenuOpen: false,
            saveNotification: saveMessage
          };

          // Auto-save when resting
          saveGame(newState);

          return newState;
        }

        case 'CLEAR_NOTIFICATION': {
          return {
            ...state,
            saveNotification: null
          };
        }

        case 'SWITCH_ACTIVE_AT_BONFIRE': {
          // Can only switch to creatures with HP > 0
          const targetCreature = state.team[action.index];
          if (!targetCreature || targetCreature.hp <= 0) {
            return state;
          }
          return {
            ...state,
            activeCreatureIndex: action.index,
            bonfireMenuOpen: false
          };
        }

        case 'CLOSE_BONFIRE_MENU': {
          return {
            ...state,
            bonfireMenuOpen: false,
            withdrawMenuOpen: false,
            depositMenuOpen: false,
            kindleMenuOpen: false,
            titlesMenuOpen: false
          };
        }

        case 'TOGGLE_WITHDRAW_MENU': {
          return {
            ...state,
            withdrawMenuOpen: !state.withdrawMenuOpen,
            depositMenuOpen: false,
            kindleMenuOpen: false,
            titlesMenuOpen: false
          };
        }

        case 'WITHDRAW_SOULS': {
          const amount = Math.min(action.amount, state.bankedSouls);
          if (amount <= 0) return state;
          const newState = {
            ...state,
            souls: state.souls + amount,
            bankedSouls: state.bankedSouls - amount
          };
          saveGame(newState);
          return newState;
        }

        case 'TOGGLE_DEPOSIT_MENU': {
          return {
            ...state,
            depositMenuOpen: !state.depositMenuOpen,
            withdrawMenuOpen: false,
            kindleMenuOpen: false,
            titlesMenuOpen: false
          };
        }

        case 'TOGGLE_KINDLE_MENU': {
          return {
            ...state,
            kindleMenuOpen: !state.kindleMenuOpen,
            depositMenuOpen: false,
            withdrawMenuOpen: false,
            titlesMenuOpen: false
          };
        }

        case 'TOGGLE_TITLES_MENU': {
          return {
            ...state,
            titlesMenuOpen: !state.titlesMenuOpen,
            depositMenuOpen: false,
            withdrawMenuOpen: false,
            kindleMenuOpen: false
          };
        }

        case 'KINDLE_CREATURE': {
          const kindleCfg = GAME_CONFIG.souls.kindle;
          const creature = state.team[action.index];
          if (!creature) return state;

          const count = creature.kindled?.count || 0;
          if (count >= kindleCfg.maxKindles) {
            return { ...state, saveNotification: 'The flame can give this one no more.' };
          }

          const cost = kindleCfg.baseCost + kindleCfg.costStep * count;
          if (state.souls < cost) {
            return { ...state, saveNotification: `Not enough carried souls (need ${cost}).` };
          }

          const isHp = action.stat === 'hp';
          const gained = isHp ? kindleCfg.hpPerKindle : kindleCfg.staminaPerKindle;
          const kindled = {
            hp: (creature.kindled?.hp || 0) + (isHp ? gained : 0),
            stamina: (creature.kindled?.stamina || 0) + (isHp ? 0 : gained),
            count: count + 1
          };

          const newTeam = [...state.team];
          newTeam[action.index] = {
            ...creature,
            kindled,
            // The new strength arrives immediately
            hp: creature.hp > 0 && isHp ? creature.hp + gained : creature.hp,
            stamina: !isHp ? creature.stamina + gained : creature.stamina
          };

          const name = creature.nickname || creature.name;
          const newState = {
            ...state,
            team: newTeam,
            souls: state.souls - cost,
            saveNotification: `${name} kindled: +${gained} max ${isHp ? 'HP' : 'Stamina'} (${cost} souls)`
          };
          saveGame(newState);
          return newState;
        }

        case 'DEPOSIT_SOULS': {
          const amount = Math.min(action.amount, state.souls);
          if (amount <= 0) return state;
          const newState = {
            ...state,
            souls: state.souls - amount,
            bankedSouls: state.bankedSouls + amount
          };
          saveGame(newState);
          return newState;
        }

        case 'SELECT_MOVE': {
          // Forced = deferred resolution after a faster enemy already acted this round
          if (action.forced) {
            state = { ...state, pendingMove: null };
          }

          const activeCreature = state.team[state.activeCreatureIndex];
          // Flinching strips priority from ATTACKS only. Guard must always stay
          // reliable, or a telegraphed boss blow becomes unbraceable.
          const { hasFlinching } = applyScars(activeCreature, STARTERS[activeCreature.id]);
          const move = (action.move.priority && hasFlinching && action.move.damage > 0)
            ? { ...action.move, priority: false }
            : action.move;

          if (move.cost > activeCreature.stamina) {
            if (action.forced) {
              // Stamina was drained before the deferred move could resolve
              return {
                ...state,
                battleLog: [...state.battleLog, `${activeCreature.nickname || activeCreature.name} couldn't muster the stamina!`],
                turnPhase: 'player'
              };
            }
            // Normally unreachable (UI disables unaffordable moves), but
            // never fail silently: say why nothing happened
            return {
              ...state,
              battleLog: [...state.battleLog, `Not enough stamina for ${move.name}!`]
            };
          }

          const playerScarMods = getScarModifiers(activeCreature);

          // Initiative: a faster enemy strikes before non-priority moves resolve.
          // This is checked FIRST. The freeze rolls below must happen exactly
          // once per round, at the moment the move actually resolves - rolling
          // them before the deferral would roll them again on the forced pass.
          if (!action.forced && !move.priority && state.enemy && state.enemy.hp > 0) {
            const playerSpeed = getEffectiveSpeed(activeCreature, STARTERS[activeCreature.id]);
            const enemySpeed = getEffectiveSpeed(state.enemy, state.enemyCreature);
            if (enemySpeed > playerSpeed) {
              return {
                ...state,
                pendingMove: move,
                battleLog: [...state.battleLog, `${state.enemyCreature.name} moves first!`],
                turnPhase: 'enemy'
              };
            }
          }

          // Chill can freeze the creature, consuming its action for the round
          if (activeCreature.chillTurns > 0 && Math.random() < GAME_CONFIG.statusFx.chillSkipChance) {
            return {
              ...state,
              battleLog: [...state.battleLog, `${activeCreature.nickname || activeCreature.name} is frozen and can't move!`],
              turnPhase: action.forced ? 'player' : 'enemy'
            };
          }

          // Haunted scar: sometimes the memory of death takes the turn instead
          if (playerScarMods.hauntChance > 0 && Math.random() < playerScarMods.hauntChance) {
            return {
              ...state,
              battleLog: [...state.battleLog, `${activeCreature.nickname || activeCreature.name} freezes, haunted by what it saw beyond the veil...`],
              turnPhase: action.forced ? 'player' : 'enemy'
            };
          }

          let newTeam = [...state.team];
          let newEnemy = { ...state.enemy };
          let log = [...state.battleLog];
          // Forced moves resolve after the enemy already acted - the round ends here
          let turnPhase = action.forced ? 'player' : 'enemy';

          if (move.effect === 'rest') {
            // Hesitant scar upside: rest recovers more
            newTeam[state.activeCreatureIndex] = {
              ...activeCreature,
              // Rest grants only the base; the per-round tick in ENEMY_TURN
              // completes the spec's +12 total (base 8 + tick 4)
              stamina: Math.min(activeCreature.stamina + GAME_CONFIG.combat.restRecoveryBase + playerScarMods.restBonus,
                applyScars(activeCreature, STARTERS[activeCreature.id]).maxStamina),
              winded: false,
              isGuarding: false
            };
            log.push(`${activeCreature.nickname || activeCreature.name} rests and recovers stamina.`);
            return { ...state, team: newTeam, battleLog: log, turnPhase };
          }

          // Purifying Light - removes all status effects and heals (Withered halves it)
          if (move.effect === 'purify') {
            const baseData = STARTERS[activeCreature.id];
            const { maxHp } = applyScars(activeCreature, baseData);
            const purifyHeal = Math.max(1, Math.floor((move.healAmount || GAME_CONFIG.fallbacks.healAmount) * playerScarMods.healingMult));
            newTeam[state.activeCreatureIndex] = {
              ...activeCreature,
              hp: Math.min(activeCreature.hp + purifyHeal, maxHp),
              stamina: activeCreature.stamina - move.cost,
              burnTurns: 0,
              poisonTurns: 0,
              chillTurns: 0,
              winded: false,
              isGuarding: false
            };
            log.push(`${activeCreature.nickname || activeCreature.name} used ${move.name}!`);
            log.push(`${activeCreature.nickname || activeCreature.name} is purified and healed!`);
            if (newTeam[state.activeCreatureIndex].stamina < GAME_CONFIG.combat.windedThreshold) {
              newTeam[state.activeCreatureIndex].winded = true;
              log.push(`${activeCreature.nickname || activeCreature.name} is winded!`);
            }
            return { ...state, team: newTeam, battleLog: log, turnPhase };
          }

          if (move.effect === 'guard') {
            newTeam[state.activeCreatureIndex] = {
              ...activeCreature,
              stamina: activeCreature.stamina - move.cost,
              isGuarding: true
            };
            log.push(`${activeCreature.nickname || activeCreature.name} takes a defensive stance.`);

            if (activeCreature.stamina - move.cost < GAME_CONFIG.combat.windedThreshold) {
              newTeam[state.activeCreatureIndex].winded = true;
              log.push(`${activeCreature.nickname || activeCreature.name} is winded!`);
            }

            return { ...state, team: newTeam, battleLog: log, turnPhase };
          }

          // Blinded scar: attacks can miss outright (stamina still spent)
          if (playerScarMods.missChance > 0 && Math.random() < playerScarMods.missChance) {
            newTeam[state.activeCreatureIndex] = {
              ...activeCreature,
              stamina: activeCreature.stamina - move.cost,
              isGuarding: false
            };
            if (newTeam[state.activeCreatureIndex].stamina < GAME_CONFIG.combat.windedThreshold) {
              newTeam[state.activeCreatureIndex].winded = true;
            }
            log.push(`${activeCreature.nickname || activeCreature.name}'s ${move.name} misses! (Blinded)`);
            return { ...state, team: newTeam, battleLog: log, turnPhase };
          }

          // Thornwall punishes a foe that is guarding or winding up a telegraph
          const enemyIsExposed = newEnemy.isGuarding || !!state.bossTelegraph;
          const attackMove = (move.effect === 'punish' && enemyIsExposed)
            ? { ...move, damage: move.damage + (move.punishBonus || 0) }
            : move;

          const damage = calculateDamage(attackMove, activeCreature, newEnemy,
            STARTERS[activeCreature.id], state.enemyCreature, 1.0, state.isBossFight);

          newEnemy.hp = Math.max(0, newEnemy.hp - damage);
          newEnemy.isGuarding = false;

          const effectiveness = TYPE_CHART[STARTERS[activeCreature.id].type][state.enemyCreature.type];
          let effectText = '';
          if (effectiveness > 1) effectText = " It's super effective!";
          if (effectiveness < 1) effectText = " It's not very effective...";

          log.push(`${activeCreature.nickname || activeCreature.name} used ${attackMove.name}! ${damage} damage.${effectText}`);

          if (move.effect === 'punish') {
            log.push(enemyIsExposed
              ? `${state.enemyCreature.name} was wide open! Thornwall bites deep.`
              : `${state.enemyCreature.name} wasn't exposed. The thorns find little purchase.`);
          }

          // Immolate: the fire that hurts you too
          if (move.effect === 'recoil' && move.recoilDamage) {
            newTeam[state.activeCreatureIndex] = {
              ...newTeam[state.activeCreatureIndex],
              hp: Math.max(0, activeCreature.hp - move.recoilDamage)
            };
            log.push(`${activeCreature.nickname || activeCreature.name} takes ${move.recoilDamage} recoil damage!`);
          }

          // Apply status effects to enemy based on move (scar immunities block re-marking)
          if (move.effect && move.effectChance && Math.random() * 100 < move.effectChance) {
            const enemyScarMods = getScarModifiers(newEnemy);
            if (move.effect === 'burn' && (!newEnemy.burnTurns || newEnemy.burnTurns === 0) && !enemyScarMods.immuneBurn) {
              newEnemy.burnTurns = GAME_CONFIG.statusFx.burnDuration;
              log.push(`${state.enemyCreature.name} is burning!`);
            }
            if (move.effect === 'poison' && (!newEnemy.poisonTurns || newEnemy.poisonTurns === 0) && !enemyScarMods.immunePoison) {
              newEnemy.poisonTurns = GAME_CONFIG.statusFx.poisonDuration;
              log.push(`${state.enemyCreature.name} is poisoned!`);
            }
            if (move.effect === 'chill' && (!newEnemy.chillTurns || newEnemy.chillTurns === 0) && !enemyScarMods.immuneChill) {
              newEnemy.chillTurns = GAME_CONFIG.statusFx.chillDuration;
              log.push(`${state.enemyCreature.name} is chilled!`);
            }
          }

          // Void Drain - drains stamina from enemy and heals self (Withered halves the heal)
          if (move.effect === 'drain') {
            const drainAmount = move.drainStamina || GAME_CONFIG.fallbacks.drainStamina;
            const healAmount = Math.max(1, Math.floor((move.drainHp || GAME_CONFIG.fallbacks.drainHp) * playerScarMods.healingMult));
            newEnemy.stamina = Math.max(0, newEnemy.stamina - drainAmount);
            const baseData = STARTERS[activeCreature.id];
            const { maxHp } = applyScars(activeCreature, baseData);
            newTeam[state.activeCreatureIndex] = {
              ...newTeam[state.activeCreatureIndex],
              hp: Math.min(activeCreature.hp + healAmount, maxHp)
            };
            log.push(`${activeCreature.nickname || activeCreature.name} drains ${drainAmount} stamina and heals ${healAmount} HP!`);
          }

          newTeam[state.activeCreatureIndex] = {
            ...newTeam[state.activeCreatureIndex],
            stamina: activeCreature.stamina - move.cost,
            isGuarding: false
          };

          if (newTeam[state.activeCreatureIndex].stamina < GAME_CONFIG.combat.windedThreshold) {
            newTeam[state.activeCreatureIndex].winded = true;
            log.push(`${activeCreature.nickname || activeCreature.name} is winded!`);
          }

          // Recoil (Immolate) can kill your own creature. A death is a death: it
          // always scars, even when the same blow killed the enemy.
          const selfKO = newTeam[state.activeCreatureIndex].hp <= 0;
          const selfKOCause = {
            isBoss: state.isBossFight,
            killerType: STARTERS[activeCreature.id].type,
            wasWinded: newTeam[state.activeCreatureIndex].winded,
            physical: true
          };

          // Enemy still standing: an ordinary death. Checked before the phase
          // transition so a self-KO isn't swallowed by the boss transforming.
          if (newEnemy.hp > 0 && selfKO) {
            return handleCreatureFaint(state, newTeam, newEnemy, log, selfKOCause);
          }

          // Trade kill. Both fell. If nothing of ours walks away, the win is
          // hollow and it is still a game over.
          let survivorIndex = state.activeCreatureIndex;
